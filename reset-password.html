<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="reset_password_title">إعادة تعيين كلمة المرور</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none; }
        .strength-bar { height: 4px; border-radius: 4px; margin: 6px 0 12px; transition: all 0.3s; width: 0; background: #ddd; }
        .strength-weak { width: 30%; background: var(--color-danger); }
        .strength-medium { width: 60%; background: var(--color-warning); }
        .strength-strong { width: 100%; background: var(--color-success); }
        .requirements { list-style: none; padding: 0; margin: 8px 0 0; font-size: 13px; text-align: right; }
        .requirements li { color: var(--color-danger); margin-bottom: 4px; }
        .requirements li.met { color: var(--color-success); text-decoration: line-through; }
    </style>
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width: 420px; margin: auto; text-align: center;">
    <div class="logo"><span class="logo-icon">🛡️</span><span class="logo-text">SafeScan</span></div>
    <h1 data-key="reset_password_title">إعادة تعيين كلمة المرور</h1>
    <div class="subtitle" data-key="reset_password_sub">أدخل كلمة مرور جديدة</div>

    <form id="resetForm">
        <div class="input-group">
            <label data-key="new_password_label">🔒 كلمة المرور الجديدة</label>
            <div class="password-wrapper">
                <input type="password" id="newPassword" placeholder="••••••••" required oninput="checkStrength()">
                <span class="toggle-password" onclick="togglePassword('newPassword')">👁️</span>
            </div>
            <div id="strengthIndicator" class="strength-bar"></div>
            <ul class="requirements" id="reqList">
                <li id="reqLength">❌ 8 أحرف على الأقل</li>
                <li id="reqUpper">❌ حرف كبير (A-Z)</li>
                <li id="reqNumber">❌ رقم (0-9)</li>
                <li id="reqSymbol">❌ رمز (@#$%^&*)</li>
            </ul>
        </div>
        <div class="input-group">
            <label data-key="confirm_password_label">🔒 تأكيد كلمة المرور</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" data-key="save_new_password">حفظ كلمة المرور الجديدة</button>
        <div id="errorMsg" class="error-text"></div>
    </form>

    <div class="footer-note" style="margin-top: 24px;">
        <a href="/login.html" data-key="back_to_login">العودة لتسجيل الدخول</a>
    </div>

    <div style="margin-top: 30px; text-align: center; font-size: 13px; color: var(--text-muted);">
        <a href="/privacy.html" style="color: var(--text-muted);" data-key="privacy_title">سياسة الخصوصية</a> ·
        <a href="/terms.html" style="color: var(--text-muted);" data-key="terms_title">شروط الاستخدام</a> ·
        <a href="/support.html" style="color: var(--text-muted);" data-key="support_title">الدعم</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    document.getElementById('langSelect').value = currentLang;
    applyTranslations();
    document.getElementById('langSelect').addEventListener('change', function() { setLanguage(this.value); });

    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };

    function togglePassword(id) { const inp = document.getElementById(id); inp.type = inp.type === 'password' ? 'text' : 'password'; }

    function checkStrength() {
        const pw = document.getElementById('newPassword').value;
        const bar = document.getElementById('strengthIndicator');
        bar.className = 'strength-bar';
        bar.style.width = '0';
        if (pw.length === 0) return;

        let score = 0;
        if (pw.length >= 8) { score++; document.getElementById('reqLength').classList.add('met'); document.getElementById('reqLength').innerHTML = '✅ 8 أحرف على الأقل'; }
        else { document.getElementById('reqLength').classList.remove('met'); document.getElementById('reqLength').innerHTML = '❌ 8 أحرف على الأقل'; }

        if (/[A-Z]/.test(pw)) { score++; document.getElementById('reqUpper').classList.add('met'); document.getElementById('reqUpper').innerHTML = '✅ حرف كبير (A-Z)'; }
        else { document.getElementById('reqUpper').classList.remove('met'); document.getElementById('reqUpper').innerHTML = '❌ حرف كبير (A-Z)'; }

        if (/[0-9]/.test(pw)) { score++; document.getElementById('reqNumber').classList.add('met'); document.getElementById('reqNumber').innerHTML = '✅ رقم (0-9)'; }
        else { document.getElementById('reqNumber').classList.remove('met'); document.getElementById('reqNumber').innerHTML = '❌ رقم (0-9)'; }

        if (/[^A-Za-z0-9]/.test(pw)) { score++; document.getElementById('reqSymbol').classList.add('met'); document.getElementById('reqSymbol').innerHTML = '✅ رمز (@#$%^&*)'; }
        else { document.getElementById('reqSymbol').classList.remove('met'); document.getElementById('reqSymbol').innerHTML = '❌ رمز (@#$%^&*)'; }

        if (score >= 4) bar.classList.add('strength-strong');
        else if (score >= 2) bar.classList.add('strength-medium');
        else bar.classList.add('strength-weak');
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPw = document.getElementById('newPassword').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        const errorEl = document.getElementById('errorMsg');
        errorEl.textContent = '';

        if (newPw !== confirmPw) { errorEl.textContent = '❌ كلمتا المرور غير متطابقتين.'; return; }

        if (newPw.length < 8 || !/[A-Z]/.test(newPw) || !/[0-9]/.test(newPw) || !/[^A-Za-z0-9]/.test(newPw)) {
            errorEl.textContent = '❌ كلمة المرور ضعيفة. يجب أن تستوفي جميع الشروط أعلاه.';
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get('phone');
        const saved = JSON.parse(localStorage.getItem('safescan_reset_code') || '{}');
        const userPhone = phone || saved.phone;
        if (!userPhone) { errorEl.textContent = '❌ الرجاء إدخال رقم الجوال في صفحة نسيت كلمة المرور أولاً.'; return; }

        try {
            const { error } = await supabaseClient.auth.updateUser({ password: newPw });
            if (error) { errorEl.textContent = '❌ فشل تغيير كلمة المرور. تأكد من استخدام أحرف إنجليزية.'; return; }
            localStorage.removeItem('safescan_reset_code');
            alert('✅ تم تغيير كلمة المرور بنجاح!');
            window.location.href = '/login.html';
        } catch(err) { errorEl.textContent = '❌ حدث خطأ غير متوقع.'; }
    });
</script>
</body>
</html>
