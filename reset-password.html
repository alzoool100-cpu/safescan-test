<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="reset_password_title">إعادة تعيين كلمة المرور</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none; }
        .strength-fill { height: 6px; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0; }
        .strength-label { font-size: 13px; margin-top: 4px; }
        .requirements { list-style: none; padding: 0; margin: 8px 0 0; font-size: 13px; text-align: right; }
        .requirements li { color: var(--color-danger); margin-bottom: 4px; }
        .requirements li.met { color: var(--color-success); text-decoration: line-through; }
    </style>
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width: 420px; margin: auto; text-align: center;">
    <div class="logo"><span class="logo-icon">🛡️</span><span class="logo-text">SafeScan</span></div>
    <h1 data-key="reset_password_title">إعادة تعيين كلمة المرور</h1>
    <div class="subtitle">أدخل رمز التحقق الذي وصلك عبر الإشعار ثم كلمة المرور الجديدة</div>

    <form id="resetForm">
        <div class="input-group">
            <label>🔢 رمز التحقق (6 أرقام)</label>
            <input type="text" id="otpInput" placeholder="123456" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required style="letter-spacing:6px; font-size:20px; text-align:center;">
        </div>
        <div class="input-group">
            <label data-key="new_password_label">🔒 كلمة المرور الجديدة</label>
            <div class="password-wrapper">
                <input type="password" id="newPassword" placeholder="••••••••" required oninput="checkStrength()">
                <span class="toggle-password" onclick="togglePassword('newPassword')">👁️</span>
            </div>
            <div class="strength-bar" style="background:#e0e0e0; border-radius:4px; margin:8px 0;">
                <div id="strengthFill" class="strength-fill"></div>
            </div>
            <div id="strengthLabel" class="strength-label"></div>
            <ul class="requirements" id="reqList">
                <li id="reqLength">❌ 8 حروف إنجليزية على الأقل</li>
                <li id="reqUpper">❌ حرف كبير (A-Z)</li>
                <li id="reqNumber">❌ رقم (0-9)</li>
                <li id="reqSymbol">❌ رمز (مثل @ أو # أو $)</li>
            </ul>
        </div>
        <div class="input-group">
            <label data-key="confirm_password_label">🔒 تأكيد كلمة المرور</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" data-key="save_new_password">حفظ كلمة المرور الجديدة</button>
        <div id="errorMsg" class="error-text"></div>
    </form>

    <div class="footer-note" style="margin-top: 24px;">
        <a href="/login.html" data-key="back_to_login">العودة لتسجيل الدخول</a>
    </div>

    <div style="margin-top: 30px; text-align: center; font-size: 13px; color: var(--text-muted);">
        <a href="/privacy.html" style="color: var(--text-muted);" data-key="privacy_title">سياسة الخصوصية</a> ·
        <a href="/terms.html" style="color: var(--text-muted);" data-key="terms_title">شروط الاستخدام</a> ·
        <a href="/support.html" style="color: var(--text-muted);" data-key="support_title">الدعم</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    document.getElementById('langSelect').value = currentLang;
    applyTranslations();
    document.getElementById('langSelect').addEventListener('change', function() { setLanguage(this.value); });

    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };

    function togglePassword(id) { const inp = document.getElementById(id); inp.type = inp.type === 'password' ? 'text' : 'password'; }

    function checkStrength() {
        const pw = document.getElementById('newPassword').value;
        const fill = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        fill.style.width = '0';
        label.textContent = '';

        if (pw.length === 0) return;

        // الشروط الجديدة
        const lengthOk = (pw.match(/[a-zA-Z]/g) || []).length >= 8; // 8 حروف إنجليزية
        const hasUpper = /[A-Z]/.test(pw);
        const hasNumber = /[0-9]/.test(pw);
        const hasSymbol = /[^A-Za-z0-9]/.test(pw);

        let score = 0;
        if (lengthOk) score++;
        if (hasUpper) score++;
        if (hasNumber) score++;
        if (hasSymbol) score++;

        const percent = (score / 4) * 100;
        fill.style.width = percent + '%';

        let strengthText = '';
        if (score <= 1) { fill.style.background = 'var(--color-danger)'; strengthText = '🔴 ضعيفة'; }
        else if (score <= 3) { fill.style.background = 'var(--color-warning)'; strengthText = '🟡 متوسطة'; }
        else { fill.style.background = 'var(--color-success)'; strengthText = '🟢 قوية'; }
        label.textContent = strengthText;

        // تحديث قائمة الشروط
        updateRequirement('reqLength', lengthOk, '8 حروف إنجليزية على الأقل');
        updateRequirement('reqUpper', hasUpper, 'حرف كبير (A-Z)');
        updateRequirement('reqNumber', hasNumber, 'رقم (0-9)');
        updateRequirement('reqSymbol', hasSymbol, 'رمز (مثل @ أو # أو $)');
    }

    function updateRequirement(id, condition, text) {
        const el = document.getElementById(id);
        if (condition) {
            el.classList.add('met');
            el.innerHTML = '✅ ' + text;
        } else {
            el.classList.remove('met');
            el.innerHTML = '❌ ' + text;
        }
    }

    const phone = new URLSearchParams(window.location.search).get('phone') || '';
    if (!phone) {
        document.getElementById('errorMsg').textContent = '❌ رابط غير صالح. ارجع لصفحة نسيت كلمة المرور.';
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const otp = document.getElementById('otpInput').value.trim();
        const newPw = document.getElementById('newPassword').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        const errorEl = document.getElementById('errorMsg');
        errorEl.textContent = '';

        if (!otp || otp.length !== 6) { errorEl.textContent = '❌ الرجاء إدخال رمز التحقق المكون من 6 أرقام.'; return; }
        if (newPw !== confirmPw) { errorEl.textContent = '❌ كلمتا المرور غير متطابقتين.'; return; }

        const letters = (newPw.match(/[a-zA-Z]/g) || []).length;
        if (letters < 8 || !/[A-Z]/.test(newPw) || !/[0-9]/.test(newPw) || !/[^A-Za-z0-9]/.test(newPw)) {
            errorEl.textContent = '❌ كلمة المرور ضعيفة. تأكد من 8 حروف إنجليزية + حرف كبير + رقم + رمز.';
            return;
        }

        if (!phone) { errorEl.textContent = '❌ الرجاء العودة لصفحة نسيت كلمة المرور.'; return; }

        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true;
        btn.textContent = '⏳ جار التحقق...';

        try {
            const res = await fetch('/.netlify/functions/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, otp, new_password: newPw }),
            });
            const data = await res.json();

            if (!res.ok || !data.ok) {
                const msgs = {
                    no_otp: '❌ لم يتم إرسال رمز تحقق لهذا الرقم. ارجع وأرسل الرمز من جديد.',
                    otp_used: '❌ تم استخدام هذا الرمز مسبقاً. ارجع وأرسل رمزاً جديداً.',
                    otp_expired: '❌ انتهت صلاحية الرمز (10 دقائق). ارجع وأرسل رمزاً جديداً.',
                    otp_invalid: '❌ رمز التحقق غير صحيح.',
                    update_failed: '❌ فشل تحديث كلمة المرور. حاول مجدداً.',
                };
                errorEl.textContent = msgs[data.error] || '❌ حدث خطأ. حاول مجدداً.';
                btn.disabled = false;
                btn.textContent = 'حفظ كلمة المرور الجديدة';
                return;
            }

            alert('✅ تم تغيير كلمة المرور بنجاح!');
            window.location.href = '/login.html';
        } catch(err) {
            errorEl.textContent = '❌ حدث خطأ غير متوقع. حاول مجدداً.';
            btn.disabled = false;
            btn.textContent = 'حفظ كلمة المرور الجديدة';
        }
    });
</script>
</body>
</html>
