<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="privacy_title">سياسة الخصوصية</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width:650px;text-align:right;line-height:1.9;margin-top:60px;">
    <h1 data-key="privacy_title">سياسة الخصوصية</h1>
    <p style="color:var(--text-muted)" data-key="privacy_last_update">آخر تحديث: 1 مايو 2026</p>
    <p data-key="privacy_intro"></p>
    <h2 data-key="privacy_s1_title"></h2><p data-key="privacy_s1_text"></p>
    <h2 data-key="privacy_s2_title"></h2><p data-key="privacy_s2_text"></p>
    <h2 data-key="privacy_s3_title"></h2><p data-key="privacy_s3_text"></p>
    <h2 data-key="privacy_s4_title"></h2><p data-key="privacy_s4_text"></p>
    <h2 data-key="privacy_s5_title"></h2><p data-key="privacy_s5_text"></p>
    <h2 data-key="privacy_s6_title"></h2><p data-key="privacy_s6_text"></p>
    <h2 data-key="privacy_s7_title"></h2><p data-key="privacy_s7_text"></p>
    <h2 data-key="privacy_s8_title"></h2><p data-key="privacy_s8_text"></p>
    <h2 data-key="privacy_s9_title"></h2><p data-key="privacy_s9_text"></p>
    <div style="margin-top:32px;text-align:center"><a href="/" data-key="privacy_back"></a></div>
</div>
<script src="translations.js"></script>
<script>
    applyTranslations();
    document.getElementById('langSelect').value = currentLang;
    document.getElementById('langSelect').addEventListener('change', function(){ setLanguage(this.value); });
    const dt = document.getElementById('darkModeToggle');
    if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode');dt.textContent='☀️';}
    dt.onclick=()=>{document.documentElement.classList.toggle('dark-mode');const is=document.documentElement.classList.contains('dark-mode');localStorage.setItem('darkMode',is);dt.textContent=is?'☀️':'🌙';};
</script>
</body>
</html>
