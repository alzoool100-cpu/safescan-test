<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="privacy_title">سياسة الخصوصية</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width:600px;text-align:right;line-height:1.8">
    <h1 data-key="privacy_title">سياسة الخصوصية</h1>
    <p data-key="privacy_content">نحن نحمي خصوصيتك...</p>
</div>

<script src="translations.js"></script>
<script>
    document.getElementById('langSelect').value = currentLang;
    applyTranslations();
    document.getElementById('langSelect').addEventListener('change', function() {
        setLanguage(this.value);
    });
</script>
</body>
</html>
