<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="forgot_password_title">نسيت كلمة المرور</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width: 420px; margin: auto; text-align: center;">
    <div class="logo"><span class="logo-icon">🛡️</span><span class="logo-text">SafeScan</span></div>
    <h1 data-key="forgot_password_title">نسيت كلمة المرور</h1>
    <div class="subtitle" id="pageSubtitle">أدخل رقم جوالك لاستقبال رمز التحقق</div>

    <form id="forgotForm">
        <div class="input-group">
            <label data-key="phone_label">📱 رقم الجوال</label>
            <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary">إرسال رمز التحقق</button>
        <div id="errorMsg" class="error-text"></div>
    </form>

    <div id="otpBox" style="display:none; margin-top:16px;">
        <div style="background:var(--color-primary);color:white;border-radius:20px;padding:28px 20px;text-align:center;">
            <div style="font-size:13px;opacity:0.9;margin-bottom:10px;">🔐 رمز التحقق الخاص بك</div>
            <div id="otpDisplay" style="font-size:44px;font-weight:700;letter-spacing:10px;font-family:monospace;"></div>
            <div style="font-size:12px;margin-top:10px;opacity:0.8;">⏱️ صالح لمدة 30 دقيقة — لا تشاركه مع أحد</div>
        </div>
        <button onclick="goToReset()" class="btn btn-primary" style="width:100%;margin-top:14px;">
            التالي — إدخال الرمز وتغيير كلمة المرور ←
        </button>
        <p style="font-size:12px;color:var(--text-muted);margin-top:10px;">
            📳 سيصلك أيضاً إشعار على جوالك كنسخة احتياطية
        </p>
    </div>

    <div class="footer-note" style="margin-top: 24px;">
        <a href="/login.html" data-key="back_to_login">العودة لتسجيل الدخول</a>
    </div>

    <div style="margin-top: 30px; text-align: center; font-size: 13px; color: var(--text-muted);">
        <a href="/privacy.html" style="color: var(--text-muted);" data-key="privacy_title">سياسة الخصوصية</a> ·
        <a href="/terms.html" style="color: var(--text-muted);" data-key="terms_title">شروط الاستخدام</a> ·
        <a href="/support.html" style="color: var(--text-muted);" data-key="support_title">الدعم</a>
    </div>
</div>

<script src="translations.js"></script>
<script>
    document.getElementById('langSelect').value = currentLang;
    applyTranslations();
    document.getElementById('langSelect').addEventListener('change', function() { setLanguage(this.value); });

    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };

    let currentPhone = '';

    function goToReset() {
        window.location.href = '/reset-password.html?phone=' + encodeURIComponent(currentPhone);
    }

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const phone = document.getElementById('phone').value.trim();
        const errorEl = document.getElementById('errorMsg');
        const btn = document.getElementById('submitBtn');
        errorEl.textContent = '';

        if (!phone) { errorEl.textContent = '❌ الرجاء إدخال رقم الجوال'; return; }

        btn.disabled = true;
        btn.textContent = '⏳ جار الإرسال...';

        try {
            const res = await fetch('/.netlify/functions/reset-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone }),
            });
            if (!res.ok) throw new Error('server_error');
            const data = await res.json();

            currentPhone = phone;
            document.getElementById('forgotForm').style.display = 'none';
            document.getElementById('pageSubtitle').style.display = 'none';

            const otpBox = document.getElementById('otpBox');
            const otpDisplay = document.getElementById('otpDisplay');

            if (data.otp) {
                otpDisplay.textContent = data.otp;
            } else {
                otpDisplay.textContent = '------';
                otpDisplay.style.fontSize = '18px';
                otpDisplay.style.letterSpacing = '2px';
                otpDisplay.textContent = 'تحقق من إشعار جوالك';
            }

            otpBox.style.display = 'block';

        } catch (err) {
            errorEl.textContent = '❌ حدث خطأ. حاول مجدداً.';
            btn.disabled = false;
            btn.textContent = 'إرسال رمز التحقق';
        }
    });
</script>
</body>
</html>
