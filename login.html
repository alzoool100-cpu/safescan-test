<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تسجيل دخول المالك</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تسجيل الدخول</h1>
        <div class="subtitle">لأصحاب السيارات المسجلين</div>

        <form id="loginForm">
            <div class="input-group">
                <label>📱 رقم الجوال</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
            </div>
            <div class="input-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn btn-primary">دخول</button>
            <div id="errorMsg" class="error-text"></div>
        </form>
        <div class="footer-note">ليس لديك حساب؟ <a href="/register.html" style="color: var(--color-primary);">فعّل استيكر جديد</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';

            if (!phone || !password) { errorEl.textContent = '❌ الرجاء إدخال رقم الجوال وكلمة المرور'; return; }

            const email = `${phone}@safescan.local`;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: email, password: password });

            if (error) { errorEl.textContent = '❌ رقم الجوال أو كلمة المرور غير صحيحة'; return; }
            window.location.href = '/dashboard.html';
        });
    </script>
</body>
</html>
