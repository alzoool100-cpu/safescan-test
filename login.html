<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تسجيل الدخول</title>
    <link rel="stylesheet" href="base.css">
    <style>
        .input-group { position: relative; margin-bottom: 16px; text-align: right; }
        .input-group label { display: block; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
        .input-group input { padding-right: 45px; }
        .input-group .icon { position: absolute; right: 15px; top: 40px; font-size: 18px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تسجيل الدخول</h1>
        <div class="subtitle">لأصحاب السيارات المسجلين</div>

        <form id="loginForm">
            <div class="input-group">
                <label>رقم الجوال</label>
                <span class="icon">📱</span>
                <input type="tel" id="phone" placeholder="05xxxxxxxx">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <span class="icon">🔒</span>
                <input type="password" id="password" placeholder="كلمة المرور">
            </div>
            <button type="submit" class="btn btn-primary">دخول</button>
            <div id="errorMsg" class="error-text"></div>
        </form>
        <div class="footer-note">
            ليس لديك حساب؟ <a href="/register.html" style="color: var(--color-primary);">فعّل استيكر جديد</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        if (!supabaseClient) alert('خطأ في تحميل المكتبات.');
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';
            if (!phone || !password) { errorEl.textContent = '❌ الرجاء إدخال البيانات'; return; }
            const email = `${phone}@safescan.local`;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { errorEl.textContent = '❌ بيانات خاطئة'; return; }
            window.location.href = '/dashboard.html';
        });
    </script>
</body>
</html>
