<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js').catch(()=>{}); }
    </script>
    <style>
        .quick-msgs { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; justify-content: center; }
    </style>
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="position:relative;z-index:1;">
    <div class="logo"><span class="logo-icon">🚗</span><span class="logo-text">SafeScan</span><span class="nfc-badge">NFC</span></div>
    <h1 data-key="contact_owner">تواصل مع مالك السيارة</h1>
    <div class="subtitle"><span data-key="scan_contact">المسح للتواصل مع مالك السيارة</span></div>
    <div style="background:var(--bg-tag);padding:8px 12px;border-radius:40px;font-size:13px;margin-bottom:20px;display:inline-block" data-key="safe_message">🔔 رسالتك آمنة ولن يظهر رقمك</div>

    <div id="ownerContactArea" style="display:none; background: var(--bg-tag); padding: 12px; border-radius: 20px; margin: 16px 0;">
        <div id="ownerPhoneSection" style="display:none;">
            <p style="font-weight: 600; margin-bottom: 8px;" data-key="phone_revealed">📱 رقم مالك السيارة:</p>
            <a id="ownerPhoneLink" href="#" style="font-size: 18px; font-weight: 700; color: var(--color-primary); text-decoration: none;"></a>
        </div>
        <div id="whatsappSection" style="display:none; margin-top: 12px;">
            <a id="whatsappLink" href="#" target="_blank" style="text-decoration: none;">
                <button class="btn btn-success" style="background: #25D366; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;" data-key="whatsapp_contact">💬 تواصل عبر واتساب</button>
            </a>
        </div>
        <div id="smsSection" style="display:none; margin-top: 12px;">
            <a id="smsLink" href="#" style="text-decoration: none;">
                <button class="btn btn-outline" style="width:100%;" data-key="sms_only">📨 رسائل نصية</button>
            </a>
        </div>
    </div>

    <div id="chatLog" style="display:none; margin: 20px 0; max-height: 300px; overflow-y: auto; text-align: right;">
        <div id="chatMessages"></div>
    </div>

    <textarea id="messageInput" data-placeholder="message_placeholder" placeholder="اكتب رسالتك هنا..."></textarea>

    <div class="quick-msgs">
        <button class="btn-tag" data-key="quick_block">🚫 تسد الطريق</button>
        <button class="btn-tag" data-key="quick_lights">💡 الأضواء</button>
        <button class="btn-tag" data-key="quick_accident">⚠️ حادث</button>
        <button class="btn-tag" data-key="quick_window">🪟 النافذة مفتوحة</button>
        <button class="btn-tag" data-key="quick_car_sale">🚗 السيارة للبيع؟</button>
        <button class="btn-tag" data-key="quick_plate_sale">🏷️ اللوحة للبيع؟</button>
    </div>

    <button class="btn btn-primary" onclick="sendMessage()" data-key="send_btn">📨 إرسال الرسالة</button>
    <div id="errorMsg" class="error-text"></div>

    <div id="sessionArea" class="session-area" style="display:none; text-align: center;">
        <button id="openChatBtn" class="btn btn-success" onclick="openChat()" data-key="chat_open" style="font-size: 14px; padding: 10px 20px;">💬 فتح في نافذة جديدة</button>
        <p class="info-text" style="margin-top: 8px;" data-key="link_valid">⏱️ الرابط صالح لمدة ساعة واحدة</p>
    </div>

    <div style="margin-top:20px;border-top:1px solid var(--border-color);padding-top:16px;">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:8px" data-key="get_sticker_desc">هل تريد استيكر لسيارتك؟</p>
        <a href="https://safescan.app/store" target="_blank" style="text-decoration:none;">
            <button class="btn btn-outline" style="width:100%;" data-key="get_sticker">🛒 احصل على استيكر SafeScan</button>
        </a>
    </div>
    <div style="margin-top:16px;font-size:13px;">
        <a href="/login.html" style="color: var(--text-muted);" data-key="owner_login">🔐 مالك السيارة؟ سجل دخولك</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (!supabaseClient) alert('خطأ في تحميل المكتبات.');

    const urlParams = new URLSearchParams(window.location.search);
    const stickerToken = urlParams.get('token');
    let currentSessionToken = '';
    let waitingForReply = false;

    // ========== بصمة الزائر ==========
    function getVisitorFingerprint() {
        const data = [
            navigator.userAgent,
            screen.width,
            screen.height,
            navigator.language,
            new Date().getTimezoneOffset()
        ].join('|');
        return btoa(data).substring(0, 24); // ترميز قصير
    }

    // ========== التوجيه الذكي ==========
    async function checkStickerAndRedirect() {
        if (!stickerToken || !supabaseClient) return;
        try {
            const { data: s } = await supabaseClient
                .from('stickers')
                .select('status')
                .eq('qr_token', stickerToken)
                .maybeSingle()
                .setHeader('Accept', 'application/json');
            if (s && s.status === 'factory_new') window.location.href = '/register.html?token=' + stickerToken;
        } catch(e) {}
    }
    checkStickerAndRedirect();

    // ========== إظهار وسائل التواصل ==========
    async function checkOwnerPhone() {
        if (!stickerToken || !supabaseClient) return;
        try {
            const { data: sticker } = await supabaseClient.from('stickers').select('vehicle_id').eq('qr_token', stickerToken).maybeSingle().setHeader('Accept', 'application/json');
            if (!sticker) return;
            const { data: vehicle } = await supabaseClient.from('vehicles').select('user_id').eq('id', sticker.vehicle_id).maybeSingle().setHeader('Accept', 'application/json');
            if (!vehicle) return;
            const { data: profile } = await supabaseClient.from('profiles').select('phone, show_phone, contact_method').eq('id', vehicle.user_id).maybeSingle().setHeader('Accept', 'application/json');

            if (!profile || profile.show_phone !== true || !profile.phone) {
                document.getElementById('ownerContactArea').style.display = 'none';
                return;
            }

            const method = profile.contact_method || 'all';
            const phone = profile.phone;
            document.getElementById('ownerContactArea').style.display = 'block';
            document.getElementById('ownerPhoneSection').style.display = 'none';
            document.getElementById('whatsappSection').style.display = 'none';
            document.getElementById('smsSection').style.display = 'none';

            if (method === 'all' || method === 'phone') {
                document.getElementById('ownerPhoneLink').href = 'tel:' + phone;
                document.getElementById('ownerPhoneLink').innerText = phone;
                document.getElementById('ownerPhoneSection').style.display = 'block';
            }
            if (method === 'all' || method === 'whatsapp') {
                document.getElementById('whatsappLink').href = 'https://wa.me/' + phone.replace(/[^0-9]/g, '');
                document.getElementById('whatsappSection').style.display = 'block';
            }
            if (method === 'all' || method === 'sms') {
                document.getElementById('smsLink').href = 'sms:' + phone;
                document.getElementById('smsSection').style.display = 'block';
            }
        } catch(e) {}
    }
    checkOwnerPhone();

    // ========== أزرار الرسائل الجاهزة ==========
    function setMessage(text) { document.getElementById('messageInput').value = text; }
    document.querySelectorAll('[data-key^="quick_"]').forEach(btn => {
        btn.addEventListener('click', function() { setMessage(this.textContent); });
    });
    function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}
    // ========== فحص الحظر وإرسال الرسالة ==========
    async function sendMessage() {
        const sendBtn = document.querySelector('.btn-primary[data-key="send_btn"]');
if (sendBtn) { sendBtn.textContent = '⏳ جار الإرسال...'; sendBtn.disabled = true; }
        if (!supabaseClient) return;
        const msg = document.getElementById('messageInput').value.trim();
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = '';
        if (!msg) { errEl.textContent = '❌ ' + (t('error_msg') || 'اكتب رسالة'); return; }
        if (!stickerToken) { errEl.textContent = '❌ ' + (t('error_token') || 'لم يتم التعرف'); return; }

        if (waitingForReply) {
            errEl.textContent = '❌ انتظر رد المالك أولاً قبل إرسال رسالة أخرى.';
            return;
        }

        const now = Date.now();
        const quotaKey = 'safescan_quota_' + stickerToken;
        let quota = JSON.parse(localStorage.getItem(quotaKey) || '{"count":0,"resetAt":0}');
        if (now > quota.resetAt) { quota = { count: 0, resetAt: now + 3600000 }; }
        if (quota.count >= 3) {
            errEl.textContent = '❌ لقد أرسلت 3 رسائل. يمكنك المحاولة بعد قليل أو انتظار رد المالك.';
            return;
        }

        // بصمة الزائر
        const fingerprint = getVisitorFingerprint();

        const { data: sticker, error: se } = await supabaseClient
            .from('stickers').select('id, status, vehicle_id').eq('qr_token', stickerToken)
            .maybeSingle().setHeader('Accept', 'application/json');
        if (se || !sticker) { errEl.textContent = '❌ ' + (t('sticker_invalid') || 'استيكر غير صالح'); return; }
        if (sticker.status !== 'active') {
            errEl.textContent = '❌ ' + (sticker.status === 'inactive' ? 'المالك أوقف الاستقبال مؤقتاً' : t('sticker_invalid') || 'استيكر غير مفعّل');
            return;
        }

        // جلب قائمة المحظورين للمالك
        if (sticker.vehicle_id) {
            const { data: vehicle } = await supabaseClient
                .from('vehicles').select('user_id').eq('id', sticker.vehicle_id).maybeSingle().setHeader('Accept', 'application/json');
            if (vehicle) {
                const { data: profile } = await supabaseClient
                    .from('profiles').select('blocked_ips').eq('id', vehicle.user_id).maybeSingle().setHeader('Accept', 'application/json');
                let blocked = [];
                try { blocked = JSON.parse(profile?.blocked_ips || '[]'); } catch(e) {}
                if (blocked.includes(fingerprint)) {
                    errEl.textContent = '❌ ' + (t('blocked_message') || 'تم حظرك من قبل المالك');
                    return;
                }
            }
        }

        if (sticker.vehicle_id) {
            const { data: v } = await supabaseClient.from('vehicles').select('is_active').eq('id', sticker.vehicle_id).maybeSingle().setHeader('Accept', 'application/json');
            if (v && !v.is_active) { errEl.textContent = '❌ ' + (t('owner_unavailable') || 'المالك غير متاح'); return; }
        }

        const sTok = crypto.randomUUID();
        currentSessionToken = sTok;
        const { error: insertError } = await supabaseClient
            .from('scan_logs')
            .insert([{sticker_id: sticker.id, visitor_message: msg, session_token: sTok, status: 'pending', visitor_fingerprint: fingerprint}]);
        if (insertError) { errEl.textContent = '❌ فشل'; return; }

        quota.count++;
        localStorage.setItem(quotaKey, JSON.stringify(quota));
        waitingForReply = true;
        document.getElementById('messageInput').disabled = true;

        localStorage.setItem('safescan_new_message', JSON.stringify({message: msg, time: Date.now()}));

        document.getElementById('chatLog').style.display = 'block';
        document.getElementById('chatMessages').innerHTML = `<div class="message-bubble visitor-bubble">🧑 أنت: ${escapeHtml(msg)}</div><div style="text-align:center; color: var(--text-muted); margin-top:10px;">⏳ في انتظار رد المالك...</div>`;
        document.getElementById('messageInput').style.display = 'none';
        document.querySelector('.quick-msgs').style.display = 'none';
        document.querySelector('.btn-primary[data-key="send_btn"]').style.display = 'none';

        document.getElementById('sessionArea').style.display = 'block';
        if (sendBtn) { sendBtn.textContent = '📨 إرسال الرسالة'; sendBtn.disabled = false; }
    }

    function openChat() {
        if (currentSessionToken) window.open('/chat.html?session=' + currentSessionToken, '_blank');
    }

    function checkReplyStatus() {
        if (!waitingForReply || !currentSessionToken) return;
        supabaseClient
            .from('scan_logs')
            .select('owner_response')
            .eq('session_token', currentSessionToken)
            .maybeSingle()
            .setHeader('Accept', 'application/json')
            .then(({ data }) => {
                if (data && data.owner_response) {
                    waitingForReply = false;
                    document.getElementById('messageInput').disabled = false;
                    document.getElementById('messageInput').style.display = 'block';
                    document.querySelector('.quick-msgs').style.display = 'flex';
                    document.querySelector('.btn-primary[data-key="send_btn"]').style.display = 'block';
                    document.getElementById('chatMessages').innerHTML += `<div class="message-bubble owner-bubble">🚗 المالك: ${escapeHtml(data.owner_response)}</div>`
                    document.getElementById('errorMsg').textContent = '';
                }
            });
    }
    setInterval(checkReplyStatus, 5000);

    function showToast(msg) {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };

    const langSelect = document.getElementById('langSelect');
    if (langSelect) {
        langSelect.value = currentLang || 'ar';
        langSelect.addEventListener('change', function() { setLanguage(this.value); });
    }
</script>
</body>
</html>
