<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🚗</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تواصل مع مالك السيارة</h1>
        <div class="subtitle">
            Scan to contact the car owner<br>
            <span style="font-size:13px;">گاڑی کے مالک سے رابطہ کریں</span>
        </div>
        <div style="background: var(--bg-tag); padding: 8px 12px; border-radius: 40px; font-size: 13px; margin-bottom: 20px; display: inline-block;">
            🔔 رسالتك آمنة ولن يظهر رقمك
        </div>

        <textarea id="messageInput" placeholder="اكتب رسالتك هنا... مثال: 'أنت تسد الطريق' أو 'الأضواء مضاءة'"></textarea>

        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; justify-content: center;">
            <button class="btn-tag" onclick="setMessage('أنت تسد الممر')">🚫 تسد الطريق</button>
            <button class="btn-tag" onclick="setMessage('الأضواء مشتعلة')">💡 الأضواء</button>
            <button class="btn-tag" onclick="setMessage('حادث بسيط')">⚠️ حادث</button>
        </div>

        <button class="btn btn-primary" onclick="sendMessage()">📨 إرسال الرسالة</button>
        <div id="errorMsg" class="error-text"></div>

        <div id="sessionArea" class="session-area" style="display:none;">
            <p style="font-weight: 600; margin-bottom: 12px;">✅ تم إرسال رسالتك</p>
            <button class="btn btn-success" onclick="openChat()">💬 فتح المحادثة الآن</button>
            <div style="background: var(--bg-card); padding: 10px; border-radius: 30px; margin: 10px 0; word-break: break-all; border: 1px dashed var(--text-muted);">
                <span style="font-size:12px; color: var(--text-muted);">أو يمكنك نسخ الرابط يدوياً:</span><br>
                <span id="sessionLink" style="font-size:14px;"></span>
            </div>
            <p class="info-text">⏱️ الرابط صالح لمدة ساعة واحدة</p>
        </div>

        <div style="margin-top:16px; font-size:13px;">
            <a href="/login.html" style="color: var(--text-muted);">🔐 مالك السيارة؟ سجل دخولك</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const stickerToken = urlParams.get('token');
        let currentSessionToken = '';

        async function checkStickerAndRedirect() {
            if (!stickerToken) return;
            try {
                const { data: sticker, error } = await supabaseClient
                    .from('stickers')
                    .select('status')
                    .eq('qr_token', stickerToken)
                    .single();
                if (!error && sticker && sticker.status === 'factory_new') {
                    window.location.href = '/register.html?token=' + stickerToken;
                }
            } catch (err) {
                console.error('خطأ في التوجيه:', err);
            }
        }
        checkStickerAndRedirect();

        function setMessage(text) {
            document.getElementById('messageInput').value = text;
        }

        async function sendMessage() {
            const msg = document.getElementById('messageInput').value.trim();
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';
            if (!msg) { errorEl.textContent = '❌ الرجاء كتابة رسالة'; return; }
            if (!stickerToken) { errorEl.textContent = '❌ خطأ: لم يتم التعرف على الاستيكر'; return; }

            const { data: sticker, error: stickerError } = await supabaseClient
                .from('stickers')
                .select('id, status')
                .eq('qr_token', stickerToken)
                .single();

            if (stickerError || !sticker) { errorEl.textContent = '❌ استيكر غير صالح'; return; }
            if (sticker.status !== 'active') { errorEl.textContent = '❌ المالك غير متاح حالياً لاستقبال الرسائل'; return; }

            const sessionToken = Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
            currentSessionToken = sessionToken;

            const { error: insertError } = await supabaseClient
                .from('scan_logs')
                .insert([{ sticker_id: sticker.id, visitor_message: msg, session_token: sessionToken, status: 'pending' }]);

            if (insertError) { errorEl.textContent = '❌ فشل إرسال الرسالة.'; return; }

            const sessionLink = `https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${sessionToken}`;
            document.getElementById('sessionLink').innerText = sessionLink;
            document.getElementById('sessionArea').style.display = 'block';
            document.getElementById('messageInput').value = '';
        }

        function openChat() {
            if (currentSessionToken) {
                window.open(`https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${currentSessionToken}`, '_blank');
            } else {
                alert('الرجاء إرسال رسالة أولاً');
            }
        }
    </script>
</body>
</html>
