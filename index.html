<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
    <style>.quick-msgs{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0;justify-content:center}</style>
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<!-- القائمة المنسدلة للغة -->
<div class="lang-dropdown">
  <select id="langSelect" onchange="changeLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="position:relative;z-index:1;">
    <div class="logo"><span class="logo-icon">🚗</span><span class="logo-text">SafeScan</span><span class="nfc-badge">NFC</span></div>
    <h1 data-key="contact_owner">تواصل مع مالك السيارة</h1>
    <div class="subtitle"><span data-key="scan_contact">Scan to contact the car owner</span></div>
    <div style="background:var(--bg-tag);padding:8px 12px;border-radius:40px;font-size:13px;margin-bottom:20px;display:inline-block" data-key="safe_message">🔔 رسالتك آمنة ولن يظهر رقمك</div>
    <div id="ownerPhoneArea" style="display:none;background:var(--bg-tag);padding:12px;border-radius:20px;margin:16px 0"><p data-key="phone_revealed">📱 رقم مالك السيارة:</p><a id="ownerPhoneLink" href="#"></a></div>
    <textarea id="messageInput" data-placeholder="message_placeholder"></textarea>
    <div class="quick-msgs">
        <button class="btn-tag" onclick="setMessage('أنت تسد الممر')" data-key="quick_block">🚫 تسد الطريق</button>
        <button class="btn-tag" onclick="setMessage('الأضواء مشتعلة')" data-key="quick_lights">💡 الأضواء</button>
        <button class="btn-tag" onclick="setMessage('حادث بسيط')" data-key="quick_accident">⚠️ حادث</button>
    </div>
    <button class="btn btn-primary" onclick="sendMessage()" data-key="send_btn">📨 إرسال الرسالة</button>
    <div id="errorMsg" class="error-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    // ... (نفس كود index.js السابق مع supabaseClient و checkSticker...)

    // ===== إدارة اللغة =====
    const langSelect = document.getElementById('langSelect');
    if (langSelect) {
        langSelect.value = currentLang;
    }
    function changeLanguage(lang) {
        setLanguage(lang);
        langSelect.value = lang;
        // تحديث placeholder
        setTimeout(applyTranslations, 100);
    }

    // الوضع الليلي
    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };
</script>
</body>
</html>
