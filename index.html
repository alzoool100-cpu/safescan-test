<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
        .card { background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 28px 20px; max-width: 400px; width: 100%; text-align: center; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .nfc-badge { background: #1e293b; color: white; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 30px; }
        h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
        .subtitle { color: #475569; font-size: 15px; margin-bottom: 18px; line-height: 1.5; }
        textarea { width: 100%; padding: 18px; border: 1.5px solid #e2e8f0; border-radius: 24px; font-size: 16px; resize: vertical; min-height: 120px; }
        .quick-msgs { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; justify-content: center; }
        .quick-btn { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 14px; border-radius: 40px; font-size: 13px; cursor: pointer; }
        .btn-primary { background: #2563eb; color: white; font-weight: 600; font-size: 17px; padding: 16px; border: none; border-radius: 60px; width: 100%; cursor: pointer; margin: 12px 0; }
        .session-url { background: #f1f5f9; padding: 10px; border-radius: 40px; margin: 10px 0; word-break: break-all; }
        .error { color: #dc2626; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span>🚗</span>
            <span style="font-weight: 700; font-size: 20px;">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تواصل مع مالك السيارة</h1>
        <div class="subtitle">
            Scan to contact the car owner<br>
            <span style="font-size:13px;">گاڑی کے مالک سے رابطہ کریں</span>
        </div>
        <div class="lang-badge">🔔 رسالتك آمنة ولن يظهر رقمك</div>

        <textarea id="messageInput" placeholder="اكتب رسالتك هنا... مثال: 'أنت تسد الطريق' أو 'الأضواء مضاءة'"></textarea>

        <div class="quick-msgs">
            <span class="quick-btn" onclick="setMessage('أنت تسد الممر')">🚫 تسد الطريق</span>
            <span class="quick-btn" onclick="setMessage('الأضواء مشتعلة')">💡 الأضواء</span>
            <span class="quick-btn" onclick="setMessage('حادث بسيط')">⚠️ حادث</span>
        </div>

        <button class="btn-primary" onclick="sendMessage()">📨 إرسال الرسالة</button>
        <div id="errorMsg" class="error"></div>

        <div id="sessionArea" style="display:none;">
            <div class="session-url">
                رابط المتابعة:<br>
                <span id="sessionLink"></span>
            </div>
            <p style="font-size:12px; margin:8px 0;">⏱️ تنتهي الجلسة بعد ساعة</p>
        </div>

        <div style="margin-top:16px; font-size:13px;">
            <a href="/login.html" style="color:#64748b;">🔐 مالك السيارة؟ سجل دخولك</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // استخدام اسم متغير جديد لتجنب التعارض
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const stickerToken = urlParams.get('token');

        // --- التوجيه الذكي ---
        async function checkStickerAndRedirect() {
            if (!stickerToken) return;
            try {
                const { data: sticker, error } = await supabaseClient
                    .from('stickers')
                    .select('status')
                    .eq('qr_token', stickerToken)
                    .single();
                if (!error && sticker && sticker.status === 'factory_new') {
                    window.location.href = '/register.html?token=' + stickerToken;
                }
            } catch (err) {
                console.error('خطأ في التوجيه:', err);
            }
        }
        checkStickerAndRedirect();

        // --- دوال واجهة التواصل ---
        function setMessage(text) {
            document.getElementById('messageInput').value = text;
        }

        async function sendMessage() {
            const msg = document.getElementById('messageInput').value.trim();
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';
            
            if (!msg) {
                errorEl.textContent = '❌ الرجاء كتابة رسالة';
                return;
            }
            if (!stickerToken) {
                errorEl.textContent = '❌ خطأ: لم يتم التعرف على الاستيكر';
                return;
            }

            const { data: sticker, error: stickerError } = await supabaseClient
                .from('stickers')
                .select('id, vehicle_id, status')
                .eq('qr_token', stickerToken)
                .single();

            if (stickerError || !sticker) {
                errorEl.textContent = '❌ استيكر غير صالح';
                return;
            }
            if (sticker.status !== 'active') {
                errorEl.textContent = '❌ المالك غير متاح حالياً لاستقبال الرسائل';
                return;
            }

            const sessionToken = Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
            const { error: insertError } = await supabaseClient
                .from('scan_logs')
                .insert([{
                    sticker_id: sticker.id,
                    visitor_message: msg,
                    session_token: sessionToken,
                    status: 'pending'
                }]);

            if (insertError) {
                errorEl.textContent = '❌ فشل إرسال الرسالة. حاول مرة أخرى.';
                console.error(insertError);
                return;
            }

            const sessionLink = `https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${sessionToken}`;
            document.getElementById('sessionLink').innerText = sessionLink;
            document.getElementById('sessionArea').style.display = 'block';
            document.getElementById('messageInput').value = '';
            alert('✅ تم إرسال رسالتك. يمكنك متابعة الردود عبر الرابط أعلاه.');
        }
    </script>
</body>
</html>
