<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <link rel="stylesheet" href="base.css">
    <style>
        .quick-msgs { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; justify-content: center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🚗</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1 data-key="contact_owner">تواصل مع مالك السيارة</h1>
        <div class="subtitle">
            <span data-key="scan_contact">Scan to contact the car owner</span><br>
            <span data-key="urdu_text">گاڑی کے مالک سے رابطہ کریں</span>
        </div>
        <div style="background:var(--bg-tag);padding:8px 12px;border-radius:40px;font-size:13px;margin-bottom:20px;display:inline-block" data-key="safe_message">🔔 رسالتك آمنة ولن يظهر رقمك</div>

        <!-- منطقة إظهار رقم المالك (تظهر فقط إذا سمح) -->
        <div id="ownerPhoneArea" style="display:none; background: var(--bg-tag); padding: 12px; border-radius: 20px; margin: 16px 0;">
            <p style="font-weight: 600; margin-bottom: 8px;" data-key="phone_revealed">📱 رقم مالك السيارة:</p>
            <a id="ownerPhoneLink" href="#" style="font-size: 18px; font-weight: 700; color: var(--color-primary); text-decoration: none;"></a>
        </div>

        <textarea id="messageInput" data-placeholder="message_placeholder" placeholder="اكتب رسالتك هنا..."></textarea>

        <div class="quick-msgs">
            <button class="btn-tag" onclick="setMessage('أنت تسد الممر')" data-key="quick_block">🚫 تسد الطريق</button>
            <button class="btn-tag" onclick="setMessage('الأضواء مشتعلة')" data-key="quick_lights">💡 الأضواء</button>
            <button class="btn-tag" onclick="setMessage('حادث بسيط')" data-key="quick_accident">⚠️ حادث</button>
        </div>

        <button class="btn btn-primary" onclick="sendMessage()" data-key="send_btn">📨 إرسال الرسالة</button>
        <div id="errorMsg" class="error-text"></div>

        <div id="sessionArea" class="session-area" style="display:none;">
            <p style="font-weight:600;margin-bottom:12px" data-key="send_success">✅ تم إرسال رسالتك</p>
            <button class="btn btn-success" onclick="openChat()" data-key="chat_open">💬 فتح المحادثة الآن</button>
            <div style="background: var(--bg-card); padding: 10px; border-radius: 30px; margin: 10px 0; word-break: break-all; border: 1px dashed var(--text-muted);">
                <span data-key="copy_manual">أو يمكنك نسخ الرابط يدوياً:</span><br>
                <span id="sessionLink" style="font-size:14px;"></span>
            </div>
            <p class="info-text" data-key="link_valid">⏱️ الرابط صالح لمدة ساعة واحدة</p>
        </div>

        <div style="margin-top:16px; font-size:13px;">
            <a href="/login.html" style="color: var(--text-muted);" data-key="owner_login">🔐 مالك السيارة؟ سجل دخولك</a>
        </div>
    </div>

    <!-- المكتبات الأساسية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="translations.js"></script>
    <script>
        // تعريف جميع المتغيرات والدوال في النطاق العام (global scope)
        let supabaseClient;
        const urlParams = new URLSearchParams(window.location.search);
        const stickerToken = urlParams.get('token');
        let currentSessionToken = '';

        // التأكد من تحميل المكتبة
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            alert('خطأ في تحميل المكتبات. الرجاء المحاولة لاحقاً.');
        }

        // التوجيه الذكي (إعادة توجيه إلى التسجيل إذا كان الاستيكر غير مفعّل)
        async function checkStickerAndRedirect() {
            if (!stickerToken || !supabaseClient) return;
            try {
                const { data: sticker, error } = await supabaseClient
                    .from('stickers')
                    .select('status')
                    .eq('qr_token', stickerToken)
                    .single();
                if (!error && sticker && sticker.status === 'factory_new') {
                    window.location.href = '/register.html?token=' + stickerToken;
                }
            } catch (err) { console.error('خطأ في التوجيه:', err); }
        }
        checkStickerAndRedirect();

        // التحقق من إظهار رقم المالك (إذا سمح)
        async function checkOwnerPhone() {
            if (!stickerToken || !supabaseClient) return;
            const { data: sticker } = await supabaseClient
                .from('stickers')
                .select('vehicle_id')
                .eq('qr_token', stickerToken)
                .single();
            if (!sticker) return;
            const { data: vehicle } = await supabaseClient
                .from('vehicles')
                .select('user_id')
                .eq('id', sticker.vehicle_id)
                .single();
            if (!vehicle) return;
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('phone, show_phone')
                .eq('id', vehicle.user_id)
                .maybeSingle()
                .setHeader('Accept', 'application/json');
            if (profile && profile.show_phone && profile.phone) {
                document.getElementById('ownerPhoneLink').href = `tel:${profile.phone}`;
                document.getElementById('ownerPhoneLink').innerText = profile.phone;
                document.getElementById('ownerPhoneArea').style.display = 'block';
            }
        }
        checkOwnerPhone();

        // دالة إدراج نص سريع في صندوق الرسالة
        function setMessage(text) {
            document.getElementById('messageInput').value = text;
        }

        // دالة إرسال الرسالة إلى المالك (معدّلة للتحقق من نشاط المركبة)
        async function sendMessage() {
            if (!supabaseClient) return;
            const msg = document.getElementById('messageInput').value.trim();
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';
            if (!msg) { errorEl.textContent = '❌ ' + (t('error_msg') || 'الرجاء كتابة رسالة'); return; }
            if (!stickerToken) { errorEl.textContent = '❌ ' + (t('error_token') || 'لم يتم التعرف على الاستيكر'); return; }

            const { data: sticker, error: stickerError } = await supabaseClient
                .from('stickers').select('id, status, vehicle_id').eq('qr_token', stickerToken).single();
            if (stickerError || !sticker) { errorEl.textContent = '❌ ' + (t('sticker_invalid') || 'استيكر غير صالح'); return; }
            if (sticker.status !== 'active') { errorEl.textContent = '❌ ' + (t('owner_unavailable') || 'المالك غير متاح'); return; }

            // ==== التحقق الإضافي من نشاط المركبة ====
            if (sticker.vehicle_id) {
                const { data: vehicle } = await supabaseClient
                    .from('vehicles')
                    .select('is_active')
                    .eq('id', sticker.vehicle_id)
                    .maybeSingle()
                    .setHeader('Accept', 'application/json');
                if (vehicle && !vehicle.is_active) {
                    errorEl.textContent = '❌ ' + (t('owner_unavailable') || 'المالك غير متاح');
                    return;
                }
            }

            const sessionToken = Math.random().toString(36).substring(2,10) + Date.now().toString(36);
            currentSessionToken = sessionToken;
            const { error: insertError } = await supabaseClient
                .from('scan_logs').insert([{ sticker_id: sticker.id, visitor_message: msg, session_token: sessionToken, status: 'pending' }]);
            if (insertError) { errorEl.textContent = '❌ فشل إرسال الرسالة'; return; }

            // إرسال إشارة للوحة التحكم بأن رسالة جديدة وصلت
            localStorage.setItem('safescan_new_message', JSON.stringify({ message: msg, time: Date.now() }));

            document.getElementById('sessionLink').innerText = `https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${sessionToken}`;
            document.getElementById('sessionArea').style.display = 'block';
            document.getElementById('messageInput').value = '';
        }

        // دالة فتح المحادثة في نافذة جديدة
        function openChat() {
            if (currentSessionToken) window.open(`/chat.html?session=${currentSessionToken}`, '_blank');
            else alert('الرجاء إرسال رسالة أولاً');
        }
    </script>
</body>
</html>
