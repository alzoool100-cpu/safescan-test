<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js').catch(()=>{}); }
    </script>
    <style>
        .quick-msgs { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; justify-content: center; }
    </style>
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="position:relative;z-index:1;">
    <div class="logo"><span class="logo-icon">🚗</span><span class="logo-text">SafeScan</span><span class="nfc-badge">NFC</span></div>
    <div id="vehicleInfoArea" style="display:none; text-align:center; margin: 16px 0;">
    <img id="vehicleInfoImg" style="width:100%; max-height:200px; object-fit:cover; border-radius:16px; margin-bottom:12px; display:none;">
    <div id="vehicleInfoName" style="font-weight:700; font-size:18px; color:var(--text-primary);"></div>
</div>
<h1 style="font-size:20px; margin:8px 0;">📨 تواصل مع مالك السيارة</h1>
<div style="background:var(--bg-tag); padding:8px 14px; border-radius:40px; font-size:12px; margin-bottom:16px; display:inline-block; color:var(--text-secondary);">
    🔔 رسالتك آمنة · رقمك مخفي إلا باختيارك
</div>
<div id="stepMethod" style="display:none; margin:20px 0;">
    <p style="font-weight:600; margin-bottom:16px; font-size:17px;">كيف تريد التواصل؟</p>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary" onclick="selectMethod('message')" id="btnMessage">📨 رسالة داخل النظام (مع رد)</button>
        <button class="btn btn-primary" onclick="selectMethod('whatsapp')" id="btnWhatsapp" style="background:#25D366;">💬 واتساب</button>
        <button class="btn btn-primary" onclick="selectMethod('sms')" id="btnSms" style="background:#6c757d;">📱 رسالة SMS</button>
        <button class="btn btn-primary" onclick="selectMethod('call')" id="btnCall" style="background:#17a2b8;">📞 اتصال مباشر</button>
    </div>
</div>

<div id="stepMessage" style="display:none; margin:20px 0;">
    <p id="stepMessageTitle" style="font-weight:600; margin-bottom:16px; font-size:17px;">اختر رسالتك:</p>
    <div class="quick-msgs">
        <button class="btn-tag" onclick="selectQuickMsg(this, 'block')">🚫 تسد الطريق</button>
        <button class="btn-tag" onclick="selectQuickMsg(this, 'lights')">💡 الأضواء مفتوحة</button>
        <button class="btn-tag" onclick="selectQuickMsg(this, 'window')">🪟 النافذة مفتوحة</button>
        <button class="btn-tag" onclick="selectQuickMsg(this, 'carsale')">🚗 السيارة للبيع؟</button>
        <button class="btn-tag" onclick="selectQuickMsg(this, 'platesale')">🏷️ اللوحة للبيع؟</button>
        <button class="btn-tag" onclick="selectQuickMsg(this, 'accident')">⚠️ حادث / احتكاك</button>
        <button class="btn-tag" onclick="selectQuickMsg(this, 'custom')">✍️ رسالة خاصة</button>
    </div>
    <textarea id="messageInput" placeholder="الرسالة ستظهر هنا..." style="margin-top:12px;"></textarea>
    <div id="errorMsg" class="error-text" style="margin:8px 0;"></div>
    <button class="btn btn-primary" style="margin-top:8px;" onclick="sendMessage()">📨 إرسال</button>
    <button class="btn btn-outline" style="margin-top:8px;" onclick="showMethodStep()">← رجوع</button>
</div>

<div id="stepAccident" style="display:none; margin:20px 0;">
    <p style="font-weight:600; margin-bottom:8px;">📱 أضف رقمك ليتواصل معك المالك (اختياري)</p>
    <input type="tel" id="accidentPhone" placeholder="05xxxxxxxx" style="margin-bottom:12px;">
    <button class="btn btn-primary" onclick="finalizeAccidentSend()">📨 إرسال</button>
    <button class="btn btn-outline" style="margin-top:8px;" onclick="finalizeAccidentSend(true)">تخطي وإرسال بدون رقم</button>
</div>
    
<div id="sessionArea" class="session-area" style="display:none; text-align: center;">
    <button id="openChatBtn" class="btn btn-success" onclick="openChat()" data-key="chat_open" style="font-size: 14px; padding: 10px 20px;">💬 فتح في نافذة جديدة</button>
    <p class="info-text" style="margin-top: 8px;" data-key="link_valid">⏱️ الرابط صالح لمدة ساعة واحدة</p>
</div>

    <div style="margin-top:20px;border-top:1px solid var(--border-color);padding-top:16px;">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:8px" data-key="get_sticker_desc">هل تريد استيكر لسيارتك؟</p>
        <a href="https://safescan.app/store" target="_blank" style="text-decoration:none;">
            <button class="btn btn-outline" style="width:100%;" data-key="get_sticker">🛒 احصل على استيكر SafeScan</button>
        </a>
    </div>
    <div style="margin-top:16px;font-size:13px;">
        <a href="/login.html" style="color: var(--text-muted);" data-key="owner_login">🔐 مالك السيارة؟ سجل دخولك</a>
    </div>
<div style="margin-top:12px; font-size:12px; text-align:center; color:var(--text-muted);">
    <a href="/privacy.html" style="color:var(--text-muted); text-decoration:none;">سياسة الخصوصية</a> · 
    <a href="/terms.html" style="color:var(--text-muted); text-decoration:none;">شروط الاستخدام</a> · 
    <a href="/support.html" style="color:var(--text-muted); text-decoration:none;">الدعم</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (!supabaseClient) alert('خطأ في تحميل المكتبات.');

    const urlParams = new URLSearchParams(window.location.search);
    const stickerToken = urlParams.get('token');
    let currentSessionToken = '';
    let waitingForReply = false;
    let vehicleData = null;
    let lastOwnerResponse = '';
    let contactMethod = 'all';
let currentStep = 'method';

    // ========== بصمة الزائر ==========
    function getVisitorFingerprint() {
        const data = [
            navigator.userAgent,
            screen.width,
            screen.height,
            navigator.language,
            new Date().getTimezoneOffset()
        ].join('|');
        return btoa(data).substring(0, 24); // ترميز قصير
    }

    // ========== التوجيه الذكي ==========
    async function checkStickerAndRedirect() {
        if (!stickerToken || !supabaseClient) return;
        try {
            const { data: s } = await supabaseClient
                .from('stickers')
                .select('status')
                .eq('qr_token', stickerToken)
                .maybeSingle()
                .setHeader('Accept', 'application/json');
            if (s && s.status === 'factory_new') window.location.href = '/register.html?token=' + stickerToken;
        } catch(e) {}
    }
    checkStickerAndRedirect();

    // ========== جلب بيانات المركبة ==========
async function loadVehicleData() {
    if (!stickerToken || !supabaseClient) return;
    try {
        const { data: sticker } = await supabaseClient
            .from('stickers').select('vehicle_id')
            .eq('qr_token', stickerToken).maybeSingle();
        if (!sticker) return;
        const { data: vehicle } = await supabaseClient
            .from('vehicles').select('user_id, custom_name, model, plate_number, image_url, show_image, is_active')
            .eq('id', sticker.vehicle_id).maybeSingle();
        if (!vehicle) return;
        const { data: profile } = await supabaseClient
            .from('profiles').select('phone, show_phone, contact_method')
            .eq('id', vehicle.user_id).maybeSingle();
        vehicleData = { ...vehicle, phone: profile?.phone, show_phone: profile?.show_phone, contact_method: profile?.contact_method || 'all' };
        contactMethod = vehicleData.contact_method;
        showVehicleInfo();
        showMethodStep();
    } catch(e) {}
}

function showVehicleInfo() {
    if (!vehicleData) return;
    const carIdentity = vehicleData.custom_name || vehicleData.model || '';
const name = [carIdentity, vehicleData.plate_number].filter(Boolean).join(' · لوحة ');
    document.getElementById('vehicleInfoName').textContent = name || 'صاحب المركبة';
    if (vehicleData.show_image && vehicleData.image_url) {
        document.getElementById('vehicleInfoImg').src = vehicleData.image_url;
        document.getElementById('vehicleInfoImg').style.display = 'block';
    }
    document.getElementById('vehicleInfoArea').style.display = 'block';
}
    loadVehicleData();

    // ========== أزرار الرسائل الجاهزة ==========
    function setMessage(text) { document.getElementById('messageInput').value = text; }
    document.querySelectorAll('[data-key^="quick_"]').forEach(btn => {
        btn.addEventListener('click', function() { setMessage(this.textContent); });
    });
    function showMethodStep() {
    document.getElementById('stepMethod').style.display = 'block';
    document.getElementById('stepMessage').style.display = 'none';
    document.getElementById('stepAccident').style.display = 'none';
    const m = contactMethod;
    document.getElementById('btnWhatsapp').style.display = (m==='all'||m==='whatsapp') ? 'block' : 'none';
    document.getElementById('btnSms').style.display = (m==='all'||m==='sms') ? 'block' : 'none';
    document.getElementById('btnCall').style.display = (m==='all'||m==='phone') ? 'block' : 'none';
}

function showMessageStep() {
    document.getElementById('stepMethod').style.display = 'none';
    document.getElementById('stepMessage').style.display = 'block';
    document.getElementById('stepAccident').style.display = 'none';
}

function selectMethod(method) {
    if (method === 'call' && vehicleData?.phone) {
        window.location.href = 'tel:' + vehicleData.phone;
        return;
    }
    if (method === 'whatsapp' || method === 'sms') {
        showMessageStep();
        document.getElementById('messageInput').dataset.method = method;
        return;
    }
    showMessageStep();
    document.getElementById('messageInput').dataset.method = 'message';
}

    let pendingAccidentMsg = null;

function selectQuickMsg(btn, type) {
    const vName = vehicleData?.custom_name || vehicleData?.model || 'صاحب المركبة';
    const plate = vehicleData?.plate_number ? ' · لوحة ' + vehicleData.plate_number : '';
    const msgs = {
        block: `صاحب ${vName}${plate}، سيارتك تسد الطريق. الرجاء تحريكها. شكراً.`,
        lights: `صاحب ${vName}${plate}، أضواء سيارتك مفتوحة. الرجاء إيقافها.`,
        window: `صاحب ${vName}${plate}، نافذة سيارتك مفتوحة. الرجاء إغلاقها.`,
        carsale: `مرحباً صاحب ${vName}${plate}، هل سيارتك معروضة للبيع؟ أرجو التواصل.`,
        platesale: `مرحباً صاحب ${vName}${plate}، هل اللوحة معروضة للبيع؟ أرجو التواصل.`,
        accident: `صاحب ${vName}${plate}، أود إبلاغك بوجود احتكاك في سيارتك. أنا المسؤول وأتمنى التواصل.`,
        custom: ''
    };
    document.getElementById('messageInput').value = msgs[type] || '';
    document.getElementById('messageInput').dataset.msgType = type;
    if (type === 'custom') {
        document.getElementById('messageInput').placeholder = 'اكتب رسالتك الخاصة هنا...';
        document.getElementById('messageInput').focus();
    }
}

function showAccidentStep(originalMsg) {
    pendingAccidentMsg = originalMsg;
    document.getElementById('stepMessage').style.display = 'none';
    document.getElementById('stepAccident').style.display = 'block';
}

async function finalizeAccidentSend(skip) {
    const phone = document.getElementById('accidentPhone').value.trim();
    let finalMsg = pendingAccidentMsg;
    if (!skip && phone) {
        finalMsg += `\n📱 للتواصل: ${phone}`;
    }
    document.getElementById('messageInput').value = finalMsg;
   document.getElementById('stepAccident').style.display = 'none';
    await sendMessage(true);
}
    function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}
    // ========== فحص الحظر وإرسال الرسالة ==========
   async function sendMessage(skipAccidentCheck) {
        const sendBtn = document.querySelector('.btn-primary[data-key="send_btn"]');
if (sendBtn) { sendBtn.textContent = '⏳ جار الإرسال...'; sendBtn.disabled = true; }
        if (!supabaseClient) return;
        const msg = document.getElementById('messageInput').value.trim(); 
       const errEl = document.getElementById('errorMsg');
       const msgType = document.getElementById('messageInput').dataset.msgType;
if (!skipAccidentCheck && (msgType === 'accident' || msgType === 'carsale' || msgType === 'platesale')) {
    showAccidentStep(msg);
    if (sendBtn) { sendBtn.textContent = '📨 إرسال'; sendBtn.disabled = false; }
    return;
}
        errEl.textContent = '';
        if (!msg) { errEl.textContent = '❌ اكتب رسالة'; if (sendBtn) { sendBtn.textContent = '📨 إرسال'; sendBtn.disabled = false; } return; }
        if (!stickerToken) { errEl.textContent = '❌ ' + (t('error_token') || 'لم يتم التعرف'); return; }

        if (waitingForReply) {
            errEl.textContent = '❌ انتظر رد المالك أولاً قبل إرسال رسالة أخرى.';
            return;
        }

        const now = Date.now();
        const quotaKey = 'safescan_quota_' + stickerToken;
        let quota = JSON.parse(localStorage.getItem(quotaKey) || '{"count":0,"resetAt":0}');
        if (now > quota.resetAt) { quota = { count: 0, resetAt: now + 3600000 }; }
        if (quota.count >= 3) {
            errEl.textContent = '❌ لقد أرسلت 3 رسائل. يمكنك المحاولة بعد قليل أو انتظار رد المالك.';
            return;
        }

        // بصمة الزائر
        const fingerprint = getVisitorFingerprint();

        const { data: sticker, error: se } = await supabaseClient
            .from('stickers').select('id, status, vehicle_id').eq('qr_token', stickerToken)
            .maybeSingle().setHeader('Accept', 'application/json');
        if (se || !sticker) { errEl.textContent = '❌ ' + (t('sticker_invalid') || 'استيكر غير صالح'); return; }
        if (sticker.status !== 'active') {
            errEl.textContent = '❌ ' + (sticker.status === 'inactive' ? 'المالك أوقف الاستقبال مؤقتاً' : t('sticker_invalid') || 'استيكر غير مفعّل');
            return;
        }

        // جلب قائمة المحظورين للمالك
        if (sticker.vehicle_id) {
            const { data: vehicle } = await supabaseClient
                .from('vehicles').select('user_id').eq('id', sticker.vehicle_id).maybeSingle().setHeader('Accept', 'application/json');
            if (vehicle) {
                const { data: profile } = await supabaseClient
                    .from('profiles').select('blocked_ips').eq('id', vehicle.user_id).maybeSingle().setHeader('Accept', 'application/json');
                let blocked = [];
                try { blocked = JSON.parse(profile?.blocked_ips || '[]'); } catch(e) {}
                if (blocked.includes(fingerprint)) {
                    errEl.textContent = '❌ ' + (t('blocked_message') || 'تم حظرك من قبل المالك');
                    return;
                }
            }
        }

        if (sticker.vehicle_id) {
            const { data: v } = await supabaseClient.from('vehicles').select('is_active').eq('id', sticker.vehicle_id).maybeSingle().setHeader('Accept', 'application/json');
            if (v && !v.is_active) { errEl.textContent = '❌ ' + (t('owner_unavailable') || 'المالك غير متاح'); return; }
        }

        const method = document.getElementById('messageInput').dataset.method || 'message';
if (method === 'whatsapp' && vehicleData?.phone) {
    const waMsg = encodeURIComponent(msg);
    window.open(`https://wa.me/${vehicleData.phone.replace(/[^0-9]/g,'')}?text=${waMsg}`, '_blank');
    return;
}
if (method === 'sms' && vehicleData?.phone) {
    window.location.href = `sms:${vehicleData.phone}?body=${encodeURIComponent(msg)}`;
    return;
}
        const sTok = crypto.randomUUID();
        currentSessionToken = sTok;
        const { error: insertError } = await supabaseClient
            .from('scan_logs')
            .insert([{sticker_id: sticker.id, visitor_message: msg, session_token: sTok, status: 'pending', visitor_fingerprint: fingerprint}]);
        if (insertError) { errEl.textContent = '❌ فشل'; return; }

        quota.count++;
        localStorage.setItem(quotaKey, JSON.stringify(quota));
        waitingForReply = true;

        localStorage.setItem('safescan_new_message', JSON.stringify({message: msg, time: Date.now()}));

        document.getElementById('stepMessage').style.display = 'none';
document.getElementById('stepMethod').style.display = 'none';
document.getElementById('stepAccident').style.display = 'none';
document.getElementById('sessionArea').style.display = 'block';
document.getElementById('sessionArea').innerHTML = `
    <div class="message-bubble visitor-bubble" style="background:#e0f2fe; padding:14px; border-radius:16px; margin-bottom:10px;">🧑 أنت: ${escapeHtml(msg)}</div>
    <div id="ownerReplyBox" style="text-align:center; color: var(--text-muted); padding:10px;">⏳ في انتظار رد المالك...</div>
    <p class="info-text" style="margin-top: 12px; text-align:center;">⏱️ الجلسة صالحة لمدة ساعة</p>
    <button onclick="window.location.reload()" class="btn btn-outline" style="margin-top:12px; width:100%;">🔄 إرسال رسالة جديدة</button>
`;
        if (sendBtn) { sendBtn.textContent = '📨 إرسال الرسالة'; sendBtn.disabled = false; }
    }

    function translateOwnerMsg(){ window.open('https://translate.google.com/?sl=auto&tl=' + (currentLang||'ar') + '&text=' + encodeURIComponent(lastOwnerResponse) + '&op=translate', '_blank'); }
    function openChat() {
        if (currentSessionToken) window.open('/chat.html?session=' + currentSessionToken, '_blank');
    }

   function checkReplyStatus() {
    if (!waitingForReply || !currentSessionToken) return;
    supabaseClient
        .from('scan_logs')
        .select('owner_response')
        .eq('session_token', currentSessionToken)
        .maybeSingle()
        .setHeader('Accept', 'application/json')
        .then(({ data }) => {
            if (data && data.owner_response) {
                waitingForReply = false;
                const replyBox = document.getElementById('ownerReplyBox');
                if (replyBox) {
                   lastOwnerResponse = data.owner_response;
                    replyBox.outerHTML = `<div class="message-bubble owner-bubble" style="background:#dcfce7; padding:14px; border-radius:16px; margin:10px 0;">🚗 المالك: ${escapeHtml(data.owner_response)}<br><button onclick="translateOwnerMsg()" style="background:none;border:none;color:green;cursor:pointer;font-size:12px;margin-top:6px;">🌐 ترجمة</button></div>`;
                }
            }
        });
}
    setInterval(checkReplyStatus, 5000);

    function showToast(msg) {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };

    const langSelect = document.getElementById('langSelect');
    if (langSelect) {
        langSelect.value = currentLang || 'ar';
        langSelect.addEventListener('change', function() { setLanguage(this.value); });
    }
</script>
</body>
</html>
