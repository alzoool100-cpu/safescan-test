<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="card">
        <div class="logo"><span class="logo-icon">🚗</span><span class="logo-text">SafeScan</span><span class="nfc-badge">NFC</span></div>
        <h1 data-key="contact_owner">تواصل مع مالك السيارة</h1>
        <div class="subtitle"><span data-key="scan_contact">Scan to contact the car owner</span><br><span data-key="urdu_text">گاڑی کے مالک سے رابطہ کریں</span></div>
        <div style="background:var(--bg-tag);padding:8px 12px;border-radius:40px;font-size:13px;margin-bottom:20px;display:inline-block" data-key="safe_message">🔔 رسالتك آمنة ولن يظهر رقمك</div>
        <textarea id="messageInput" data-placeholder="message_placeholder" placeholder="اكتب رسالتك هنا..."></textarea>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin:18px 0;justify-content:center">
            <button class="btn-tag" onclick="setMessage('أنت تسد الممر')" data-key="quick_block">🚫 تسد الطريق</button>
            <button class="btn-tag" onclick="setMessage('الأضواء مشتعلة')" data-key="quick_lights">💡 الأضواء</button>
            <button class="btn-tag" onclick="setMessage('حادث بسيط')" data-key="quick_accident">⚠️ حادث</button>
        </div>
        <button class="btn btn-primary" onclick="sendMessage()" data-key="send_btn">📨 إرسال الرسالة</button>
        <div id="errorMsg" class="error-text"></div>
        <div id="sessionArea" class="session-area" style="display:none">
            <p style="font-weight:600;margin-bottom:12px" data-key="send_success">✅ تم إرسال رسالتك</p>
            <button class="btn btn-success" onclick="openChat()" data-key="chat_open">💬 فتح المحادثة الآن</button>
            <div style="background:var(--bg-card);padding:10px;border-radius:30px;margin:10px 0;word-break:break-all;border:1px dashed var(--text-muted)"><span data-key="copy_manual">أو يمكنك نسخ الرابط يدوياً</span><br><span id="sessionLink"></span></div>
            <p class="info-text" data-key="link_valid">⏱️ الرابط صالح لمدة ساعة واحدة</p>
        </div>
        <div style="margin-top:16px;font-size:13px"><a href="/login.html" style="color:var(--text-muted)" data-key="owner_login">🔐 مالك السيارة؟ سجل دخولك</a></div>
    </div>
    <script src="config.js"></script>
    <script src="translations.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const stickerToken = urlParams.get('token');
        let currentSessionToken = '';
        async function checkStickerAndRedirect(){
            if(!stickerToken)return;
            const {data:s,error}=await supabaseClient.from('stickers').select('status').eq('qr_token',stickerToken).single();
            if(!error&&s&&s.status==='factory_new')window.location.href='/register.html?token='+stickerToken;
        }
        checkStickerAndRedirect();
        function setMessage(t){document.getElementById('messageInput').value=t;}
        async function sendMessage(){
            const m=document.getElementById('messageInput').value.trim(),e=document.getElementById('errorMsg');
            e.textContent='';
            if(!m){e.textContent='❌ '+t('error_msg');return;}
            if(!stickerToken){e.textContent='❌ '+t('error_token');return;}
            const {data:s,error:se}=await supabaseClient.from('stickers').select('id,status').eq('qr_token',stickerToken).single();
            if(se||!s){e.textContent='❌ '+t('sticker_invalid');return;}
            if(s.status!=='active'){e.textContent='❌ '+t('owner_unavailable');return;}
            const st=Math.random().toString(36).substring(2,10)+Date.now().toString(36);
            currentSessionToken=st;
            const {error:ie}=await supabaseClient.from('scan_logs').insert([{sticker_id:s.id,visitor_message:m,session_token:st,status:'pending'}]);
            if(ie){e.textContent='❌ فشل الإرسال';return;}
            document.getElementById('sessionLink').innerText=`https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${st}`;
            document.getElementById('sessionArea').style.display='block';
            document.getElementById('messageInput').value='';
        }
        function openChat(){if(currentSessionToken)window.open(`/chat.html?session=${currentSessionToken}`,'_blank');}
    </script>
</body>
</html>
