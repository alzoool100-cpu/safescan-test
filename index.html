<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - تواصل مع مالك السيارة</title>
    <style>
        /* ========== base.css مدمج ========== */
        :root {
            --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8;
            --color-success: #16a34a;
            --color-danger: #dc2626;
            --color-warning: #f59e0b;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --bg-tag: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --bg-tag: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 16px;
        }
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 28px 20px; max-width: 420px; width: 100%; text-align: center;
            border: 1px solid var(--border-color);
        }
        .logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .logo-icon { font-size: 28px; }
        .logo-text { font-weight: 700; font-size: 22px; color: var(--text-primary); }
        .nfc-badge {
            background: var(--text-primary); color: var(--bg-card);
            font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 30px;
        }
        h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        textarea {
            width: 100%; padding: 16px; background: var(--bg-input);
            border: 1.5px solid var(--border-color); border-radius: var(--radius-md);
            font-size: 16px; color: var(--text-primary); resize: vertical; min-height: 120px;
        }
        .btn {
            font-weight: 600; font-size: 16px; padding: 16px 24px; border: none;
            border-radius: 60px; width: 100%; cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-success { background: var(--color-success); color: white; }
        .btn-tag {
            background: var(--bg-tag); border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 8px 16px; border-radius: 40px;
            font-size: 13px; cursor: pointer;
        }
        .error-text { color: var(--color-danger); font-size: 14px; margin-top: 8px; }
        .info-text { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        .session-area { background: var(--bg-tag); border-radius: var(--radius-md); padding: 16px; margin-top: 16px; }
        .footer-note { margin-top: 24px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border-color); padding-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🚗</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تواصل مع مالك السيارة</h1>
        <div class="subtitle">
            Scan to contact the car owner<br>
            <span style="font-size:13px;">گاڑی کے مالک سے رابطہ کریں</span>
        </div>
        <div style="background: var(--bg-tag); padding: 8px 12px; border-radius: 40px; font-size: 13px; margin-bottom: 20px; display: inline-block;">
            🔔 رسالتك آمنة ولن يظهر رقمك
        </div>

        <textarea id="messageInput" placeholder="اكتب رسالتك هنا... مثال: 'أنت تسد الطريق' أو 'الأضواء مضاءة'"></textarea>

        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; justify-content: center;">
            <button class="btn-tag" onclick="setMessage('أنت تسد الممر')">🚫 تسد الطريق</button>
            <button class="btn-tag" onclick="setMessage('الأضواء مشتعلة')">💡 الأضواء</button>
            <button class="btn-tag" onclick="setMessage('حادث بسيط')">⚠️ حادث</button>
        </div>

        <button class="btn btn-primary" onclick="sendMessage()">📨 إرسال الرسالة</button>
        <div id="errorMsg" class="error-text"></div>

        <div id="sessionArea" class="session-area" style="display:none;">
            <p style="font-weight: 600; margin-bottom: 12px;">✅ تم إرسال رسالتك</p>
            <button class="btn btn-success" onclick="openChat()">💬 فتح المحادثة الآن</button>
            <div style="background: var(--bg-card); padding: 10px; border-radius: 30px; margin: 10px 0; word-break: break-all; border: 1px dashed var(--text-muted);">
                <span style="font-size:12px; color: var(--text-muted);">أو يمكنك نسخ الرابط يدوياً:</span><br>
                <span id="sessionLink" style="font-size:14px;"></span>
            </div>
            <p class="info-text">⏱️ الرابط صالح لمدة ساعة واحدة</p>
        </div>

        <div style="margin-top:16px; font-size:13px;">
            <a href="/login.html" style="color: var(--text-muted);">🔐 مالك السيارة؟ سجل دخولك</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const stickerToken = urlParams.get('token');
        let currentSessionToken = '';

        async function checkStickerAndRedirect() {
            if (!stickerToken) return;
            try {
                const { data: sticker, error } = await supabaseClient
                    .from('stickers')
                    .select('status')
                    .eq('qr_token', stickerToken)
                    .single();
                if (!error && sticker && sticker.status === 'factory_new') {
                    window.location.href = '/register.html?token=' + stickerToken;
                }
            } catch (err) { console.error('خطأ في التوجيه:', err); }
        }
        checkStickerAndRedirect();

        function setMessage(text) { document.getElementById('messageInput').value = text; }

        async function sendMessage() {
            const msg = document.getElementById('messageInput').value.trim();
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';
            if (!msg) { errorEl.textContent = '❌ الرجاء كتابة رسالة'; return; }
            if (!stickerToken) { errorEl.textContent = '❌ خطأ: لم يتم التعرف على الاستيكر'; return; }

            const { data: sticker, error: stickerError } = await supabaseClient
                .from('stickers').select('id, status').eq('qr_token', stickerToken).single();
            if (stickerError || !sticker) { errorEl.textContent = '❌ استيكر غير صالح'; return; }
            if (sticker.status !== 'active') { errorEl.textContent = '❌ المالك غير متاح'; return; }

            const sessionToken = Math.random().toString(36).substring(2,10) + Date.now().toString(36);
            currentSessionToken = sessionToken;
            const { error: insertError } = await supabaseClient
                .from('scan_logs').insert([{ sticker_id: sticker.id, visitor_message: msg, session_token: sessionToken, status: 'pending' }]);
            if (insertError) { errorEl.textContent = '❌ فشل إرسال الرسالة'; return; }

            document.getElementById('sessionLink').innerText = `https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${sessionToken}`;
            document.getElementById('sessionArea').style.display = 'block';
            document.getElementById('messageInput').value = '';
        }

        function openChat() {
            if (currentSessionToken) window.open(`https://calm-chebakia-9ddff4.netlify.app/chat.html?session=${currentSessionToken}`, '_blank');
            else alert('الرجاء إرسال رسالة أولاً');
        }
    </script>
</body>
</html>
