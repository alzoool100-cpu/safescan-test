[build]
  command   = "npm install"
  publish   = "."
  functions = "netlify/functions"

[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Content-Type = "application/javascript"
    Service-Worker-Allowed = "/"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdn.onesignal.com api.onesignal.com; connect-src 'self' https://hyvmxyxzwbaneiqbaccs.supabase.co wss://hyvmxyxzwbaneiqbaccs.supabase.co https://api.onesignal.com https://cdn.onesignal.com; img-src 'self' data: blob: https://hyvmxyxzwbaneiqbaccs.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://onesignal.com https://cdn.onesignal.com; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self' cdn.onesignal.com; frame-ancestors 'none'; form-action 'self'; object-src 'none'; base-uri 'self';"
