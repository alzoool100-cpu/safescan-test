<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SafeScan</title><link rel="stylesheet" href="base.css"></head>
<body><div class="container" style="max-width:500px;margin:0 auto">
<h2 data-key="chat_title">💬 محادثة مؤقتة مع مالك السيارة</h2>
<div id="status"></div><div id="messages"></div>
<div style="display:flex;justify-content:center;margin-top:16px"><button class="btn-secondary" onclick="loadMessages()" data-key="refresh_btn">🔄 تحديث الآن</button></div>
<div class="info-text" style="text-align:center;margin-top:16px">
<span data-key="session_info">⏱️ تنتهي الجلسة بعد ساعة</span><br>
<span data-key="identity_hidden">📵 هويتك مجهولة</span><br>
<span data-key="no_reply">🔒 لا يمكنك الرد</span></div>
</div>
<script src="config.js"></script><script src="translations.js"></script>
<script>
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const stok=new URLSearchParams(window.location.search).get('session');
let arI,replied=false;
async function loadMessages(){
 const mD=document.getElementById('messages'),sD=document.getElementById('status');
 if(!stok){mD.innerHTML='<div class="error-text">❌ رابط غير صالح</div>';return;}
 sD.innerHTML='<div class="loading">⏳ جار التحميل...</div>';
 const {data,error}=await supabaseClient.from('scan_logs').select('visitor_message,owner_response,status').eq('session_token',stok).maybeSingle();
 if(error||!data){sD.innerHTML='<div class="error-text">❌ الجلسة غير موجودة</div>';clearInterval(arI);return;}
 let h=`<div class="message-bubble visitor-bubble">🧑 زائر: ${data.visitor_message}</div>`;
 if(data.owner_response){
  h+=`<div class="message-bubble owner-bubble">🚗 مالك: ${data.owner_response}</div>`;
  replied=true;clearInterval(arI);
  sD.innerHTML='<div class="status-badge status-replied">✅ '+t('session_ended')+'</div>';
 }else{replied=false;sD.innerHTML='<div class="status-badge status-pending">⏳ '+t('waiting_reply')+'</div>';}
 mD.innerHTML=h;
}
function startAR(){clearInterval(arI);arI=setInterval(()=>{if(!replied)loadMessages();},3000);}
loadMessages();startAR();
</script></body></html>
