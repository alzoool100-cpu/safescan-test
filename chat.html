<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - محادثة مؤقتة</title>
    <link rel="stylesheet" href="base.css">
    <style>
        .container { max-width: 500px; margin: 0 auto; }
        .btn-secondary { background: var(--bg-tag); color: var(--text-primary); border: none; padding: 12px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2 data-key="chat_title">💬 محادثة مؤقتة مع مالك السيارة</h2>
    <div id="status"></div>
    <div id="messages"></div>
    <div style="display: flex; justify-content: center; margin-top: 16px;">
        <button class="btn-secondary" onclick="loadMessages()" data-key="refresh_btn">🔄 تحديث الآن</button>
    </div>
    <div class="info-text" style="text-align:center; margin-top:16px;">
        <span data-key="session_info">⏱️ تنتهي الجلسة بعد ساعة</span><br>
        <span data-key="identity_hidden">📵 هويتك مجهولة</span><br>
        <span data-key="no_reply">🔒 لا يمكنك الرد</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    let supabaseClient;
    if (window.supabase) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const sessionToken = urlParams.get('session');
    let autoRefreshInterval;
    let isReplied = false;

    async function loadMessages() {
        if (!supabaseClient) return;
        const messagesDiv = document.getElementById('messages');
        const statusDiv = document.getElementById('status');
        if (!sessionToken) {
            messagesDiv.innerHTML = '<div class="error-text">❌ رابط غير صالح</div>';
            return;
        }

        statusDiv.innerHTML = '<div class="loading">⏳ جار التحميل...</div>';
        const { data, error } = await supabaseClient
            .from('scan_logs')
            .select('visitor_message, owner_response, status, show_phone_to_visitor, sticker_id')
            .eq('session_token', sessionToken)
            .maybeSingle()
            .setHeader('Accept', 'application/json');

        if (error || !data) {
            statusDiv.innerHTML = '<div class="error-text">❌ الجلسة غير موجودة أو انتهت</div>';
            clearInterval(autoRefreshInterval);
            return;
        }

        statusDiv.innerHTML = '';
        let html = `<div class="message-bubble visitor-bubble">🧑 زائر: ${escapeHtml(data.visitor_message)}</div>`;

        if (data.owner_response) {
            html += `<div class="message-bubble owner-bubble">🚗 مالك: ${escapeHtml(data.owner_response)}</div>`;
            isReplied = true;
            clearInterval(autoRefreshInterval);
            statusDiv.innerHTML = '<div class="status-badge status-replied">✅ ' + (t('session_ended') || 'تم الرد - انتهت الجلسة') + '</div>';
        } else {
            isReplied = false;
            statusDiv.innerHTML = '<div class="status-badge status-pending">⏳ ' + (t('waiting_reply') || 'في انتظار رد المالك') + '</div>';
        }

        // إذا سمح المالك بإظهار رقمه لهذا الزائر
        if (data.show_phone_to_visitor && data.sticker_id) {
            try {
                const { data: sticker } = await supabaseClient
                    .from('stickers')
                    .select('vehicle_id')
                    .eq('id', data.sticker_id)
                    .maybeSingle()
                    .setHeader('Accept', 'application/json');
                if (sticker) {
                    const { data: vehicle } = await supabaseClient
                        .from('vehicles')
                        .select('user_id')
                        .eq('id', sticker.vehicle_id)
                        .maybeSingle()
                        .setHeader('Accept', 'application/json');
                    if (vehicle) {
                        const { data: profile } = await supabaseClient
                            .from('profiles')
                            .select('phone')
                            .eq('id', vehicle.user_id)
                            .maybeSingle()
                            .setHeader('Accept', 'application/json');
                        if (profile?.phone) {
                            html += `<div class="message-bubble owner-bubble">📱 ${t('phone_revealed_chat') || 'رقم المالك:'} <a href="tel:${profile.phone}" style="color: var(--color-primary); font-weight: 700;">${profile.phone}</a></div>`;
                        }
                    }
                }
            } catch (err) {
                console.error('خطأ في جلب رقم المالك:', err);
            }
        }

        messagesDiv.innerHTML = html;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    }

    function startAutoRefresh() {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(() => { if (!isReplied) loadMessages(); }, 3000);
    }

    async function init() { await loadMessages(); startAutoRefresh(); }
    window.addEventListener('beforeunload', () => clearInterval(autoRefreshInterval));
    init();
</script>
</body>
</html>
