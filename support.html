<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="support_title">الدعم الفني</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option><option value="en">English</option><option value="hi">हिन्दी</option><option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width:450px;text-align:center;margin-top:60px;">
    <h1 data-key="support_title">📞 الدعم الفني</h1>
    <p data-key="support_intro" style="margin:16px 0;color:var(--text-secondary)">نحن هنا لخدمتك. تواصل معنا عبر:</p>
    <a href="https://wa.me/966541054516" target="_blank" style="text-decoration:none"><button class="btn btn-success" style="background:#25D366;width:100%;margin-bottom:10px" data-key="support_whatsapp">💬 واتساب</button></a>
    <a href="mailto:support@safescan.app" style="text-decoration:none"><button class="btn btn-outline" style="margin-bottom:10px" data-key="support_email">📧 بريد إلكتروني</button></a>
    <a href="tel:+966541054516" style="text-decoration:none"><button class="btn btn-outline" data-key="support_phone">📞 اتصال هاتفي</button></a>
    <p style="margin-top:24px;font-size:13px;color:var(--text-muted)">© SafeScan 2026</p>
</div>
<script src="translations.js"></script>
<script>
    applyTranslations();
    document.getElementById('langSelect').value = currentLang;
    document.getElementById('langSelect').addEventListener('change', function(){ setLanguage(this.value); });
    const dt=document.getElementById('darkModeToggle');
    if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode');dt.textContent='☀️';}
    dt.onclick=()=>{document.documentElement.classList.toggle('dark-mode');const is=document.documentElement.classList.contains('dark-mode');localStorage.setItem('darkMode',is);dt.textContent=is?'☀️':'🌙';};
</script>
</body>
</html>
