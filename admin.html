<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - لوحة تحكم المشرف</title>
    <link rel="stylesheet" href="base.css">
    <style>
        .admin-container { max-width: 600px; margin: 0 auto; }
        .tab-buttons { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--bg-tag); border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .tab-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .data-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: right; }
        .data-table th { color: var(--text-secondary); font-weight: 600; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-new { background: #fef9c3; color: #854d0e; }
        .badge-closed { background: #f1f5f9; color: #475569; }
        .stats { display: flex; gap: 12px; margin-bottom: 24px; }
        .stat-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; flex: 1; text-align: center; }
        .stat-box .number { font-size: 32px; font-weight: 700; color: var(--color-primary); }
        .stat-box .label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="card" style="padding: 20px;">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge" style="background: var(--color-danger);">ADMIN</span>
        </div>
        <h2>لوحة تحكم المشرف</h2>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-box"><div class="number" id="totalUsers">-</div><div class="label">مستخدم</div></div>
            <div class="stat-box"><div class="number" id="totalStickers">-</div><div class="label">استيكر</div></div>
            <div class="stat-box"><div class="number" id="todayMessages">-</div><div class="label">رسالة اليوم</div></div>
        </div>

        <!-- تبويبات -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('users')">👥 المستخدمون</button>
            <button class="tab-btn" onclick="switchTab('stickers')">🏷️ الاستيكرات</button>
            <button class="tab-btn" onclick="switchTab('messages')">📋 الرسائل</button>
        </div>

        <!-- المحتوى -->
        <div id="tabContent">
            <div class="loading">جار التحميل...</div>
        </div>

        <div class="footer-note" style="margin-top: 24px; text-align: center;">
            للتعديل أو الحذف، استخدم لوحة تحكم Supabase مباشرة.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (!supabaseClient) alert('خطأ في تحميل المكتبات.');

    let currentTab = 'users';

    // تحميل الإحصائيات
    async function loadStats() {
        const { count: usersCount } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
        const { count: stickersCount } = await supabaseClient.from('stickers').select('*', { count: 'exact', head: true });
        const today = new Date().toISOString().split('T')[0];
        const { count: todayMessages } = await supabaseClient.from('scan_logs').select('*', { count: 'exact', head: true }).gte('created_at', today);

        document.getElementById('totalUsers').innerText = usersCount || 0;
        document.getElementById('totalStickers').innerText = stickersCount || 0;
        document.getElementById('todayMessages').innerText = todayMessages || 0;
    }

    // تبديل التبويب
    window.switchTab = function(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
        loadTabContent();
    };

    // تحميل محتوى التبويب
    async function loadTabContent() {
        const container = document.getElementById('tabContent');
        container.innerHTML = '<div class="loading">جار التحميل...</div>';

        if (currentTab === 'users') {
            const { data: profiles, error } = await supabaseClient.from('profiles').select('id, phone, show_phone');
            if (error) { container.innerHTML = '<div class="error-text">خطأ في التحميل</div>'; return; }
            if (!profiles || profiles.length === 0) { container.innerHTML = '<p>لا يوجد مستخدمون بعد.</p>'; return; }
            let html = `<table class="data-table"><tr><th>رقم الجوال</th><th>إظهار الرقم</th></tr>`;
            profiles.forEach(p => {
                html += `<tr><td>${p.phone || 'غير مسجل'}</td><td>${p.show_phone ? '✅' : '❌'}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } else if (currentTab === 'stickers') {
            const { data: stickers, error } = await supabaseClient.from('stickers').select('id, qr_token, activation_code, status, activated_at');
            if (error) { container.innerHTML = '<div class="error-text">خطأ في التحميل</div>'; return; }
            if (!stickers || stickers.length === 0) { container.innerHTML = '<p>لا توجد استيكرات بعد.</p>'; return; }
            let html = `<table class="data-table"><tr><th>QR Token</th><th>رمز التفعيل</th><th>الحالة</th><th>تاريخ التفعيل</th></tr>`;
            stickers.forEach(s => {
                const statusBadge = s.status === 'active' ? '<span class="badge badge-active">مفعل</span>' :
                                    s.status === 'factory_new' ? '<span class="badge badge-new">جديد</span>' :
                                    '<span class="badge badge-closed">' + s.status + '</span>';
                html += `<tr><td>${s.qr_token || '-'}</td><td>${s.activation_code || '-'}</td><td>${statusBadge}</td><td>${s.activated_at ? new Date(s.activated_at).toLocaleDateString('ar-SA') : '-'}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } else if (currentTab === 'messages') {
            const { data: logs, error } = await supabaseClient.from('scan_logs').select('visitor_message, owner_response, status, created_at').order('created_at', { ascending: false }).limit(50);
            if (error) { container.innerHTML = '<div class="error-text">خطأ في التحميل</div>'; return; }
            if (!logs || logs.length === 0) { container.innerHTML = '<p>لا توجد رسائل بعد.</p>'; return; }
            let html = `<table class="data-table"><tr><th>الزائر</th><th>المالك</th><th>الحالة</th><th>التاريخ</th></tr>`;
            logs.forEach(l => {
                const statusBadge = l.status === 'closed' ? '<span class="badge badge-closed">تم الرد</span>' : '<span class="badge badge-new">جديدة</span>';
                html += `<tr><td>${l.visitor_message?.substring(0, 40) || '-'}</td><td>${l.owner_response?.substring(0, 40) || '-'}</td><td>${statusBadge}</td><td>${new Date(l.created_at).toLocaleString('ar-SA')}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }
    }

    // تهيئة الصفحة
    loadStats();
    loadTabContent();
</script>
</body>
</html>
