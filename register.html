<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="activate_title">تفعيل الاستيكر</title>
    <link rel="stylesheet" href="base.css">
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js').catch(()=>{}); }
    </script>
    <style>
        .optional-badge { background: var(--bg-tag); color: var(--text-muted); font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-right: 6px; }
        .preview-image { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-md); margin-top: 8px; display: none; }
        .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: block; }
    </style>
</head>
<body>

<button id="darkModeToggle" style="position:fixed;top:15px;left:15px;z-index:9999;background:var(--bg-card);border:1px solid var(--border-color);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:var(--shadow-card);">🌙</button>

<div class="lang-dropdown">
  <select id="langSelect" onchange="setLanguage(this.value)">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="hi">हिन्दी</option>
    <option value="ur">اردو</option>
  </select>
</div>

<div class="card" style="max-width: 480px; position: relative; z-index: 1;">
    <div class="logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">SafeScan</span>
        <span class="nfc-badge">NFC</span>
    </div>
    <h1 data-key="activate_title">تفعيل الاستيكر</h1>
    <div class="subtitle" data-key="activate_sub">Activate your sticker</div>

    <form id="activateForm">
        <!-- حقول أساسية (مطلوبة) -->
        <div class="input-group">
            <label data-key="phone_label">📱 رقم الجوال</label>
            <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
        </div>
        <div class="input-group">
            <label data-key="token_label">🔑 رمز التفعيل (من الكرت)</label>
            <input type="text" id="token" placeholder="XXXXXX" required>
        </div>
        <div class="input-group">
            <label data-key="password_label">🔒 كلمة المرور</label>
            <input type="password" id="password" placeholder="كلمة المرور" required minlength="6">
            <span class="hint" data-key="password_hint">ستستخدمها لتسجيل الدخول لاحقاً</span>
        </div>

        <!-- فاصل: معلومات إضافية (اختيارية) -->
        <div style="border-top: 1px solid var(--border-color); margin: 24px 0; padding-top: 16px;">
            <strong data-key="additional_info">📝 معلومات إضافية عن المركبة</strong>
            <span class="optional-badge" data-key="optional">اختياري</span>
            <p style="font-size:12px; color: var(--text-muted); margin-top: 4px;" data-key="optional_desc">يمكنك ملؤها الآن أو لاحقاً من الإعدادات</p>
        </div>

        <!-- حقل صورة المركبة -->
        <div class="input-group">
            <label data-key="image_label">📸 صورة المركبة</label>
            <input type="file" id="vehicleImage" accept="image/*" onchange="previewImage(event)">
            <img id="imagePreview" class="preview-image" />
        </div>

        <!-- حقل اسم المركبة -->
        <div class="input-group">
            <label data-key="car_name_label">🏷️ اسم المركبة</label>
            <input type="text" id="carName" data-placeholder="car_name_placeholder" placeholder="مثال: سيارة العمل">
        </div>

        <!-- حقل رقم اللوحة -->
        <div class="input-group">
            <label data-key="plate_label">🚘 رقم اللوحة</label>
            <input type="text" id="plateNumber" data-placeholder="plate_placeholder" placeholder="مثال: أ ب ج 1234">
        </div>

        <!-- حقل الموديل -->
        <div class="input-group">
            <label data-key="model_label">📅 الموديل</label>
            <input type="text" id="model" data-placeholder="model_placeholder" placeholder="مثال: كامري 2024">
        </div>

        <!-- حقل اسم السائق -->
        <div class="input-group">
            <label data-key="driver_label">👤 اسم السائق</label>
            <input type="text" id="driverName" data-placeholder="driver_placeholder" placeholder="مثال: أحمد محمد">
        </div>

        <button type="submit" class="btn btn-primary" data-key="activate_btn">تفعيل الاستيكر</button>
        <div id="errorMsg" class="error-text"></div>
    </form>
    <div class="footer-note">
        <span data-key="encrypted_msg">📵 رقمك مشفر ولا يظهر للغير</span><br>
        <a href="/privacy.html" style="color: var(--text-muted);">سياسة الخصوصية</a> · 
        <a href="/terms.html" style="color: var(--text-muted);">شروط الاستخدام</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script>
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (!supabaseClient) alert('خطأ في تحميل المكتبات.');

    const urlParams = new URLSearchParams(window.location.search);
    const stickerTokenFromUrl = urlParams.get('token');

    function previewImage(event) {
        const file = event.target.files[0];
        const preview = document.getElementById('imagePreview');
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) { preview.src = e.target.result; preview.style.display = 'block'; };
            reader.readAsDataURL(file);
        } else { preview.style.display = 'none'; }
    }

    document.getElementById('activateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!supabaseClient) return;
        const phone = document.getElementById('phone').value;
        const token = document.getElementById('token').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('errorMsg');
        errorEl.textContent = '';

        if (password.length < 6) {
            errorEl.textContent = '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
            return;
        }

        const { data: vehicle, error: vehicleError } = await supabaseClient
    .from('vehicles')
    .insert([{ 
        user_id: userId, 
        custom_name: carName || 'سيارتي',
        plate_number: plateNumber || null,
        model: model || null,
        driver_name: driverName || null,
        is_active: true  // <-- تفعيل تلقائي
    }])
    .select()
    .single();

        if (stickerError || !sticker) {
            errorEl.textContent = '❌ رمز التفعيل غير صحيح';
            return;
        }
        if (sticker.status !== 'factory_new') {
            errorEl.textContent = '❌ هذا الاستيكر مفعّل مسبقاً';
            return;
        }

        // 2. إنشاء مستخدم جديد
        const email = `${phone}@safescan.local`;
        const { data: authData, error: authError } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: { data: { phone: phone } }
        });

        if (authError) {
            errorEl.textContent = '❌ خطأ في إنشاء الحساب: ' + authError.message;
            return;
        }

        const userId = authData.user.id;

        // 3. تحديث رقم الجوال في الملف الشخصي
        await supabaseClient.from('profiles').update({ phone: phone }).eq('id', userId);

        // 4. إنشاء مركبة بالبيانات الإضافية (بدون أعمدة الإظهار)
        const carName = document.getElementById('carName').value;
        const plateNumber = document.getElementById('plateNumber').value;
        const model = document.getElementById('model').value;
        const driverName = document.getElementById('driverName').value;

        const { data: vehicle, error: vehicleError } = await supabaseClient
            .from('vehicles')
            .insert([{
                user_id: userId,
                custom_name: carName || 'سيارتي',
                plate_number: plateNumber || null,
                model: model || null,
                driver_name: driverName || null
            }])
            .select()
            .single();

        if (vehicleError) {
            errorEl.textContent = '❌ خطأ في إنشاء المركبة';
            return;
        }

        // 5. ربط الاستيكر بالمركبة وتفعيله
        const { error: updateError } = await supabaseClient
            .from('stickers')
            .update({ 
                vehicle_id: vehicle.id, 
                status: 'active',
                activated_at: new Date()
            })
            .eq('id', sticker.id);

        if (updateError) {
            errorEl.textContent = '❌ خطأ في تفعيل الاستيكر';
            return;
        }

        alert('✅ تم تفعيل الاستيكر بنجاح!');
        window.location.href = '/dashboard.html';
    });

    // Dark Mode
    const dt = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark-mode'); dt.textContent = '☀️'; }
    dt.onclick = () => { document.documentElement.classList.toggle('dark-mode'); const is = document.documentElement.classList.contains('dark-mode'); localStorage.setItem('darkMode', is); dt.textContent = is ? '☀️' : '🌙'; };

    // اللغة
    const langSelect = document.getElementById('langSelect');
    if (langSelect) {
        langSelect.value = currentLang || 'ar';
        langSelect.addEventListener('change', function() { setLanguage(this.value); });
    }
</script>
</body>
</html>
