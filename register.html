<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل SafeScan</title>
    <link rel="stylesheet" href="base.css">
    <style>
        .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تفعيل الاستيكر</h1>
        <div class="subtitle">Activate your sticker</div>

        <form id="activateForm">
            <div class="input-group">
                <label>📱 رقم الجوال</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
            </div>
            <div class="input-group">
                <label>🔑 رمز التفعيل (من الكرت)</label>
                <input type="text" id="token" placeholder="XXXXXX" required>
            </div>
            <div class="input-group">
                <label>🔒 كلمة المرور (اختر كلمة قوية)</label>
                <input type="password" id="password" placeholder="كلمة المرور" required minlength="6">
                <div class="hint">ستستخدمها لتسجيل الدخول لاحقاً</div>
            </div>
            <button type="submit" class="btn btn-primary">تفعيل الاستيكر</button>
            <div id="errorMsg" class="error-text"></div>
        </form>
        <div class="footer-note">📵 رقمك مشفر ولا يظهر للغير</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const stickerTokenFromUrl = urlParams.get('token');

        document.getElementById('activateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const token = document.getElementById('token').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';

            if (password.length < 6) {
                errorEl.textContent = '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                return;
            }

            const { data: sticker, error: stickerError } = await supabaseClient
                .from('stickers')
                .select('*')
                .eq('activation_code', token)
                .single();

            if (stickerError || !sticker) { errorEl.textContent = '❌ رمز التفعيل غير صحيح'; return; }
            if (sticker.status !== 'factory_new') { errorEl.textContent = '❌ هذا الاستيكر مفعّل مسبقاً'; return; }

            const email = `${phone}@safescan.local`;
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { data: { phone: phone } }
            });

            if (authError) { errorEl.textContent = '❌ خطأ في إنشاء الحساب: ' + authError.message; return; }

            const userId = authData.user.id;

            await supabaseClient.from('profiles').update({ phone: phone }).eq('id', userId);

            const { data: vehicle, error: vehicleError } = await supabaseClient
                .from('vehicles')
                .insert([{ user_id: userId }])
                .select()
                .single();

            if (vehicleError) { errorEl.textContent = '❌ خطأ في إنشاء المركبة'; return; }

            const { error: updateError } = await supabaseClient
                .from('stickers')
                .update({ vehicle_id: vehicle.id, status: 'active', activated_at: new Date() })
                .eq('id', sticker.id);

            if (updateError) { errorEl.textContent = '❌ خطأ في تفعيل الاستيكر'; return; }

            alert('✅ تم تفعيل الاستيكر بنجاح!');
            window.location.href = '/dashboard.html';
        });
    </script>
</body>
</html>
