<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SafeScan</title><link rel="stylesheet" href="base.css"></head>
<body><div class="card">
<div class="logo"><span class="logo-icon">🛡️</span><span class="logo-text">SafeScan</span><span class="nfc-badge">NFC</span></div>
<h1 data-key="activate_title">تفعيل الاستيكر</h1><div class="subtitle" data-key="activate_sub">Activate your sticker</div>
<form id="activateForm">
<div class="input-group"><label data-key="phone_label">رقم الجوال</label><input type="tel" id="phone" placeholder="05xxxxxxxx" required></div>
<div class="input-group"><label data-key="token_label">رمز التفعيل</label><input type="text" id="token" placeholder="XXXXXX" required></div>
<div class="input-group"><label data-key="password_label">كلمة المرور</label><input type="password" id="password" placeholder="كلمة المرور" required minlength="6"></div>
<button type="submit" class="btn btn-primary" data-key="activate_btn">تفعيل الاستيكر</button>
<div id="errorMsg" class="error-text"></div>
</form>
<div class="footer-note" data-key="encrypted_msg">📵 رقمك مشفر ولا يظهر للغير</div>
</div>
<script src="config.js"></script><script src="translations.js"></script>
<script>
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
document.getElementById('activateForm').addEventListener('submit',async e=>{
e.preventDefault();
const ph=document.getElementById('phone').value,to=document.getElementById('token').value,pw=document.getElementById('password').value,er=document.getElementById('errorMsg');
er.textContent='';
if(pw.length<6){er.textContent='❌ كلمة المرور قصيرة';return;}
const {data:st,error:se}=await supabaseClient.from('stickers').select('*').eq('activation_code',to).single();
if(se||!st){er.textContent='❌ رمز التفعيل غير صحيح';return;}
if(st.status!=='factory_new'){er.textContent='❌ مفعل مسبقاً';return;}
const email=`${ph}@safescan.local`;
const {data:au,error:ae}=await supabaseClient.auth.signUp({email,password:pw,options:{data:{phone:ph}}});
if(ae){er.textContent='❌ '+ae.message;return;}
await supabaseClient.from('profiles').update({phone:ph}).eq('id',au.user.id);
const {data:ve,error:ve}=await supabaseClient.from('vehicles').insert([{user_id:au.user.id}]).select().single();
if(ve) await supabaseClient.from('stickers').update({vehicle_id:ve.id,status:'active',activated_at:new Date()}).eq('id',st.id);
alert('✅ تم التفعيل');window.location.href='/dashboard.html';
});
</script></body></html>
