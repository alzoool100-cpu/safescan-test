<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل SafeScan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
        .card { background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 28px 20px; max-width: 400px; width: 100%; text-align: center; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 28px; }
        .nfc-badge { background: #1e293b; color: white; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 30px; }
        h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
        .subtitle { color: #475569; font-size: 15px; margin-bottom: 24px; line-height: 1.4; }
        .input-group { margin-bottom: 18px; text-align: right; }
        label { display: block; font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 6px; }
        input { width: 100%; padding: 16px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 16px; }
        .btn { background: #2563eb; color: white; font-weight: 600; font-size: 17px; padding: 16px; border: none; border-radius: 60px; width: 100%; cursor: pointer; margin-top: 10px; }
        .footer-note { margin-top: 24px; font-size: 12px; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .error { color: #dc2626; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span style="font-size: 26px;">🛡️</span>
            <span style="font-weight: 700; font-size: 20px;">SafeScan</span>
            <span class="nfc-badge">NFC</span>
        </div>
        <h1>تفعيل الاستيكر</h1>
        <div class="subtitle">Activate your sticker</div>
        
        <form id="activateForm">
            <div class="input-group">
                <label>📱 رقم الجوال</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
            </div>
            <div class="input-group">
                <label>🔑 رمز التفعيل (من الكرت)</label>
                <input type="text" id="token" placeholder="XXXXXX" required>
            </div>
            <button type="submit" class="btn">تفعيل الاستيكر</button>
            <div id="errorMsg" class="error"></div>
        </form>
        <div class="footer-note">📵 رقمك مشفر ولا يظهر للغير</div>
    </div>

    <!-- مكتبات Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <script>
        // تهيئة Supabase باستخدام اسم متغير جديد
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // الحصول على رمز الاستيكر من الرابط (مثال: ?token=ABC123)
        const urlParams = new URLSearchParams(window.location.search);
        const stickerTokenFromUrl = urlParams.get('token');

        document.getElementById('activateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const token = document.getElementById('token').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';

            // 1. البحث عن الاستيكر برمز التفعيل
            const { data: sticker, error: stickerError } = await supabaseClient
                .from('stickers')
                .select('*')
                .eq('activation_code', token)
                .single();

            if (stickerError || !sticker) {
                errorEl.textContent = '❌ رمز التفعيل غير صحيح';
                return;
            }
            if (sticker.status !== 'factory_new') {
                errorEl.textContent = '❌ هذا الاستيكر مفعّل مسبقاً';
                return;
            }

            // 2. إنشاء مستخدم جديد (باستخدام رقم الجوال كمصادقة - إصدار مبسط)
            const email = `${phone}@safescan.local`;
            const password = token + 'SafeScan@2026';
            
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { phone: phone }
                }
            });

            if (authError) {
                errorEl.textContent = '❌ خطأ في إنشاء الحساب: ' + authError.message;
                return;
            }

            const userId = authData.user.id;

            // 3. تحديث جدول profiles برقم الجوال
            const { error: profileError } = await supabaseClient
                .from('profiles')
                .update({ phone: phone })
                .eq('id', userId);

            if (profileError) {
                errorEl.textContent = '❌ خطأ في حفظ الملف الشخصي';
                return;
            }

            // 4. إنشاء مركبة جديدة
            const { data: vehicle, error: vehicleError } = await supabaseClient
                .from('vehicles')
                .insert([{ user_id: userId }])
                .select()
                .single();

            if (vehicleError) {
                errorEl.textContent = '❌ خطأ في إنشاء المركبة';
                return;
            }

            // 5. ربط الاستيكر بالمركبة وتفعيله
            const { error: updateError } = await supabaseClient
                .from('stickers')
                .update({ 
                    vehicle_id: vehicle.id, 
                    status: 'active',
                    activated_at: new Date()
                })
                .eq('id', sticker.id);

            if (updateError) {
                errorEl.textContent = '❌ خطأ في تفعيل الاستيكر';
                return;
            }

            alert('✅ تم تفعيل الاستيكر بنجاح!');
            window.location.href = '/dashboard.html';
        });
    </script>
</body>
</html>
