<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم SafeScan</title>
    <link rel="stylesheet" href="base.css">
    <style>
        .dashboard { max-width: 450px; margin: 0 auto; width: 100%; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .car-badge { background: var(--bg-tag); padding: 6px 14px; border-radius: 40px; font-size: 14px; }
        .stats { display: flex; gap: 12px; margin: 18px 0 8px; }
        .stat-item { background: var(--bg-tag); padding: 10px 16px; border-radius: 20px; flex: 1; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--color-primary); }
        .inbox-item { padding: 16px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .inbox-item:last-child { border-bottom: none; }
        .msg-preview { font-weight: 500; margin-bottom: 6px; }
        .msg-time { font-size: 12px; color: var(--text-muted); }
        .settings-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border-color); }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }
        .response-box { background: var(--bg-tag); padding: 12px; border-radius: 16px; margin: 12px 0; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">SafeScan</span>
        </div>
        <div class="car-badge" id="vehicleName">🚗 سيارتي</div>
    </div>

    <div class="card">
        <div class="status-toggle" style="display: flex; align-items: center; justify-content: space-between;">
            <span class="toggle-label" id="statusLabel">🟢 حالة الاستقبال</span>
            <div class="toggle" id="statusToggle" onclick="toggleStatus()"></div>
        </div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="newCount">0</div>
                <div style="font-size:14px;">رسائل جديدة</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div style="font-size:14px;">إجمالي</div>
            </div>
        </div>
        <div style="margin-top:8px; color: var(--text-secondary);" id="notificationStatus">📱 جار التحميل...</div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <h3 style="font-size:18px;">📥 آخر الرسائل</h3>
            <button onclick="loadMessages()" style="background:none; border:none; color: var(--color-primary); cursor:pointer;">🔄 تحديث</button>
        </div>
        <div id="inboxContainer"><div class="loading">جار تحميل الرسائل...</div></div>
    </div>

    <div class="card" id="replyCard" style="display:none;">
        <h4>💬 الرد على الرسالة</h4>
        <div id="selectedMessagePreview"></div>
        <textarea id="replyText" placeholder="اكتب ردك هنا..."></textarea>
        <button class="btn btn-outline" onclick="sendReply()">إرسال الرد</button>
        <button style="background:none; border:none; margin-top:8px; color: var(--text-muted);" onclick="cancelReply()">إلغاء</button>
        <div id="replyError" class="error-text"></div>
    </div>

    <div class="card">
        <h3 style="margin-bottom:8px;">⚙️ الإعدادات السريعة</h3>
        <div class="settings-row"><span>🔔 إشعارات تيليجرام</span><span id="telegramStatus">⏳</span></div>
        <div class="settings-row"><span>📱 رقم الجوال المسجل</span><span id="phoneDisplay">---</span></div>
        <div class="settings-row"><span>🕒 الجدولة التلقائية</span><span>قريباً</span></div>
        <button class="btn btn-outline" style="margin-top:20px;" onclick="logout()">تسجيل الخروج</button>
    </div>

    <div class="footer-note">
        <a href="#" style="color: var(--color-primary);">سياسة الخصوصية</a> · <a href="#" style="color: var(--color-primary);">مركز المساعدة</a>
        <div style="margin-top:10px;">© SafeScan 2026</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null, currentVehicle = null, active = true, selectedMessageId = null;

    async function initDashboard() {
        const { data: { user }, error } = await supabaseClient.auth.getUser();
        if (error || !user) { alert('الرجاء تسجيل الدخول أولاً'); window.location.href = '/login.html'; return; }
        currentUser = user;

        const { data: profile } = await supabaseClient.from('profiles').select('phone').eq('id', user.id).maybeSingle().setHeader('Accept', 'application/json');
        document.getElementById('phoneDisplay').innerText = profile?.phone || 'غير مسجل';

        const { data: vehicles } = await supabaseClient.from('vehicles').select('*').eq('user_id', user.id).limit(1);
        if (vehicles && vehicles.length > 0) {
            currentVehicle = vehicles[0];
            document.getElementById('vehicleName').innerText = currentVehicle.custom_name;
            active = currentVehicle.is_active;
            updateToggleUI();
        } else {
            const { data: newVehicle } = await supabaseClient.from('vehicles').insert([{ user_id: user.id }]).select().single();
            currentVehicle = newVehicle;
            document.getElementById('vehicleName').innerText = 'سيارتي';
        }
        loadMessages();
    }

    function updateToggleUI() {
        const toggle = document.getElementById('statusToggle');
        const label = document.getElementById('statusLabel');
        if (active) {
            toggle.classList.remove('off');
            label.innerHTML = '🟢 حالة الاستقبال';
            document.getElementById('notificationStatus').innerHTML = '📱 سيتم إشعارك فور وصول رسالة';
        } else {
            toggle.classList.add('off');
            label.innerHTML = '🔴 متوقف (خصوصية تامة)';
            document.getElementById('notificationStatus').innerHTML = '🔕 الإشعارات متوقفة';
        }
    }

    async function toggleStatus() {
        if (!currentVehicle) return;
        active = !active;
        updateToggleUI();
        await supabaseClient.from('vehicles').update({ is_active: active }).eq('id', currentVehicle.id);
    }

    async function loadMessages() {
        if (!currentVehicle) return;
        const { data: stickers } = await supabaseClient.from('stickers').select('id').eq('vehicle_id', currentVehicle.id);
        if (!stickers || stickers.length === 0) { document.getElementById('inboxContainer').innerHTML = '<div class="loading">لا توجد استيكرات مرتبطة</div>'; return; }
        const stickerIds = stickers.map(s => s.id);

        const { data: logs, error } = await supabaseClient.from('scan_logs').select('*').in('sticker_id', stickerIds).order('created_at', { ascending: false }).limit(20);
        if (error) { document.getElementById('inboxContainer').innerHTML = '<div class="loading">خطأ في التحميل</div>'; return; }

        const pendingCount = logs.filter(l => l.status === 'pending').length;
        document.getElementById('newCount').innerText = pendingCount;
        document.getElementById('totalCount').innerText = logs.length;

        if (logs.length === 0) { document.getElementById('inboxContainer').innerHTML = '<div class="loading">لا توجد رسائل بعد</div>'; return; }

        let html = '';
        logs.forEach(log => {
            const date = new Date(log.created_at);
            const timeStr = date.toLocaleString('ar-SA', { hour:'2-digit', minute:'2-digit', day:'numeric', month:'numeric' });
            html += `<div class="inbox-item" onclick="selectMessage('${log.id}')">
                <div class="msg-preview">"${log.visitor_message.substring(0, 50)}${log.visitor_message.length > 50 ? '...' : ''}"</div>
                <div class="msg-time">${timeStr} · ${log.status === 'pending' ? '🆕 جديدة' : '✅ تم الرد'}</div>
            </div>`;
        });
        document.getElementById('inboxContainer').innerHTML = html;
    }

    window.selectMessage = function(messageId) {
        supabaseClient.from('scan_logs').select('*').eq('id', messageId).single().then(({ data }) => {
            if (data) {
                selectedMessageId = data.id;
                document.getElementById('selectedMessagePreview').innerHTML = `<div class="response-box"><strong>الرسالة:</strong> ${data.visitor_message}<br>${data.owner_response ? '<strong>ردك السابق:</strong> ' + data.owner_response : ''}</div>`;
                document.getElementById('replyCard').style.display = 'block';
            }
        });
    };

    async function sendReply() {
        const reply = document.getElementById('replyText').value.trim();
        if (!reply || !selectedMessageId) return;
        const { error } = await supabaseClient.from('scan_logs').update({ owner_response: reply, status: 'closed' }).eq('id', selectedMessageId);
        if (error) { document.getElementById('replyError').textContent = '❌ فشل إرسال الرد'; return; }
        alert('✅ تم إرسال الرد');
        document.getElementById('replyCard').style.display = 'none';
        document.getElementById('replyText').value = '';
        loadMessages();
    }

    window.cancelReply = function() { document.getElementById('replyCard').style.display = 'none'; selectedMessageId = null; };

    async function logout() { await supabaseClient.auth.signOut(); window.location.href = '/index.html'; }

    initDashboard();
</script>
</body>
</html>
